<title>統合支払明細ビューア｜使い方ガイド（ドライバー・取引先向け）</title>
<style>
  :root{
    --jp:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Yu Gothic","Noto Sans JP",Meiryo,system-ui,sans-serif;
    --accent:#4f46e5; --accent-2:#6366f1; --accent-soft:#eef0ff;
    --ground:#f4f5fb; --surface:#ffffff; --surface-2:#fafbff;
    --ink:#1b1e2e; --ink-sub:#5a6076; --border:#e4e6f1;
    --teal:#0891b2; --amber:#d97706; --rose:#e11d48; --emerald:#059669;
    --shadow:0 14px 46px rgba(30,34,70,.12); --shadow-sm:0 4px 16px rgba(30,34,70,.08);
    --radius:18px;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --accent:#818cf8; --accent-2:#6366f1; --accent-soft:#20244a;
      --ground:#0d0f1d; --surface:#171a2e; --surface-2:#1e2138;
      --ink:#eef0f8; --ink-sub:#a3a9c4; --border:#2b2f4c;
      --shadow:0 16px 50px rgba(0,0,0,.5); --shadow-sm:0 4px 18px rgba(0,0,0,.4);
    }
  }
  :root[data-theme="light"]{
    --accent:#4f46e5; --accent-2:#6366f1; --accent-soft:#eef0ff;
    --ground:#f4f5fb; --surface:#ffffff; --surface-2:#fafbff;
    --ink:#1b1e2e; --ink-sub:#5a6076; --border:#e4e6f1;
    --shadow:0 14px 46px rgba(30,34,70,.12); --shadow-sm:0 4px 16px rgba(30,34,70,.08);
  }
  :root[data-theme="dark"]{
    --accent:#818cf8; --accent-2:#6366f1; --accent-soft:#20244a;
    --ground:#0d0f1d; --surface:#171a2e; --surface-2:#1e2138;
    --ink:#eef0f8; --ink-sub:#a3a9c4; --border:#2b2f4c;
    --shadow:0 16px 50px rgba(0,0,0,.5); --shadow-sm:0 4px 18px rgba(0,0,0,.4);
  }

  *{box-sizing:border-box;}
  body{margin:0;background:var(--ground);color:var(--ink);font-family:var(--jp);
    -webkit-font-smoothing:antialiased;line-height:1.6;}
  .wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;
    gap:18px;padding:24px 20px 40px;}

  /* ---- top brand row ---- */
  .brandbar{width:100%;max-width:1120px;display:flex;align-items:center;
    justify-content:space-between;gap:12px;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:11px;}
  .brand .logo{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;font-size:19px;
    box-shadow:var(--shadow-sm);}
  .brand b{font-size:15px;letter-spacing:.02em;}
  .brand span{display:block;font-size:11.5px;color:var(--ink-sub);font-weight:500;margin-top:1px;}
  .audience{font-size:11.5px;font-weight:700;letter-spacing:.06em;color:var(--accent);
    background:var(--accent-soft);padding:6px 13px;border-radius:999px;}

  /* ---- stage ---- */
  .stage{width:100%;max-width:1120px;aspect-ratio:16/9;position:relative;
    background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);
    box-shadow:var(--shadow);overflow:hidden;}
  .slide{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr;
    opacity:0;visibility:hidden;transition:opacity .55s ease,transform .55s ease;
    transform:translateY(14px);}
  .slide.active{opacity:1;visibility:visible;transform:none;}
  .slide .txt{padding:clamp(24px,4.2vw,52px);display:flex;flex-direction:column;
    justify-content:center;gap:clamp(12px,1.6vw,20px);}
  .slide .vis{background:var(--surface-2);border-left:1px solid var(--border);
    display:grid;place-items:center;padding:clamp(20px,3.5vw,46px);position:relative;overflow:hidden;}

  .kicker{display:inline-flex;align-items:center;gap:9px;font-size:clamp(11px,1.15vw,13px);
    font-weight:700;letter-spacing:.09em;color:var(--accent);text-transform:uppercase;}
  .kicker .step{background:var(--accent);color:#fff;min-width:26px;height:26px;padding:0 7px;
    border-radius:8px;display:inline-grid;place-items:center;font-size:13px;letter-spacing:0;}
  h2.title{margin:0;font-size:clamp(23px,3.5vw,42px);font-weight:800;line-height:1.22;
    letter-spacing:-.01em;text-wrap:balance;}
  .lead{margin:0;font-size:clamp(14px,1.55vw,18px);color:var(--ink-sub);max-width:38ch;}
  ul.pts{margin:6px 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:10px;}
  ul.pts li{position:relative;padding-left:28px;font-size:clamp(13.5px,1.45vw,16.5px);}
  ul.pts li::before{content:"";position:absolute;left:0;top:.52em;width:15px;height:15px;
    border-radius:5px;background:var(--accent-soft);
    box-shadow:inset 0 0 0 2px var(--accent);}
  ul.pts li b{color:var(--accent);font-weight:700;}

  /* ---- mock UI kit (right pane) ---- */
  .device{width:min(100%,340px);background:var(--surface);border:1px solid var(--border);
    border-radius:16px;box-shadow:var(--shadow);overflow:hidden;}
  .dev-top{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;
    padding:13px 16px;display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:700;}
  .dev-top .dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.55);}
  .dev-body{padding:16px;display:flex;flex-direction:column;gap:11px;}
  .fld{display:flex;flex-direction:column;gap:5px;}
  .fld label{font-size:11px;color:var(--ink-sub);font-weight:600;}
  .fld .box{border:1px solid var(--border);border-radius:9px;padding:9px 11px;font-size:13px;
    background:var(--surface-2);color:var(--ink);}
  .fld .box.ph{color:var(--ink-sub);}
  .btnp{background:var(--accent);color:#fff;text-align:center;padding:11px;border-radius:9px;
    font-weight:700;font-size:14px;box-shadow:var(--shadow-sm);}
  .btn-ghost{border:1px solid var(--border);border-radius:9px;text-align:center;padding:9px;
    font-size:12.5px;color:var(--ink-sub);font-weight:600;background:var(--surface);}
  .tabs{display:flex;gap:6px;}
  .tab{flex:1;text-align:center;font-size:11.5px;font-weight:700;padding:7px 4px;border-radius:8px;
    border:1px solid var(--border);color:var(--ink-sub);background:var(--surface-2);}
  .tab.on{background:var(--accent-soft);color:var(--accent);border-color:transparent;}
  .month{display:flex;align-items:center;justify-content:space-between;
    border:1px solid var(--border);border-radius:10px;padding:9px 12px;background:var(--surface-2);
    font-weight:700;font-size:14px;font-variant-numeric:tabular-nums;}
  .month .nav{color:var(--accent);font-weight:800;font-size:16px;}
  .row{display:flex;align-items:center;justify-content:space-between;font-size:13px;
    padding:8px 2px;border-bottom:1px dashed var(--border);font-variant-numeric:tabular-nums;}
  .row:last-child{border-bottom:0;}
  .row .lb{color:var(--ink-sub);}
  .row .vv{font-weight:700;}
  .neg{color:var(--rose);} .pos{color:var(--emerald);}
  .total{display:flex;align-items:center;justify-content:space-between;margin-top:4px;
    padding:12px 13px;border-radius:11px;background:var(--accent-soft);
    font-variant-numeric:tabular-nums;}
  .total .lb{font-size:12px;color:var(--accent);font-weight:700;}
  .total .amt{font-size:20px;font-weight:800;color:var(--accent);}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;
    padding:5px 10px;border-radius:999px;background:rgba(5,150,105,.12);color:var(--emerald);}
  .chip.wait{background:rgba(217,119,6,.13);color:var(--amber);}
  .paper{width:min(100%,300px);background:#fff;color:#222;border-radius:8px;
    box-shadow:var(--shadow);padding:20px 20px 26px;position:relative;}
  .paper h4{margin:0 0 3px;font-size:15px;letter-spacing:.04em;}
  .paper .sub{font-size:10.5px;color:#888;margin-bottom:13px;}
  .paper .pr{display:flex;justify-content:space-between;font-size:11.5px;padding:5px 0;
    border-bottom:1px solid #eee;font-variant-numeric:tabular-nums;color:#333;}
  .paper .pr.tot{border-bottom:0;font-weight:800;font-size:14px;color:#111;margin-top:4px;}
  .stamp{position:absolute;right:16px;bottom:16px;width:56px;height:56px;border-radius:50%;
    border:2.5px solid var(--rose);color:var(--rose);display:grid;place-items:center;
    font-size:10px;font-weight:800;text-align:center;line-height:1.15;transform:rotate(-11deg);
    opacity:.85;}
  .recap{display:flex;flex-direction:column;gap:12px;width:min(100%,320px);}
  .rstep{display:flex;align-items:center;gap:13px;background:var(--surface);
    border:1px solid var(--border);border-radius:13px;padding:13px 15px;box-shadow:var(--shadow-sm);}
  .rstep .n{width:30px;height:30px;border-radius:9px;background:var(--accent);color:#fff;
    display:grid;place-items:center;font-weight:800;font-size:15px;flex:none;}
  .rstep b{font-size:14.5px;} .rstep p{margin:1px 0 0;font-size:11.5px;color:var(--ink-sub);}
  .hero{display:flex;flex-direction:column;align-items:center;gap:18px;text-align:center;}
  .hero .orbit{display:flex;gap:12px;}
  .hero .orbit .t{width:74px;height:74px;border-radius:18px;display:grid;place-items:center;
    background:var(--surface);border:1px solid var(--border);box-shadow:var(--shadow-sm);
    font-size:12px;font-weight:700;color:var(--ink-sub);gap:3px;flex-direction:column;}
  .hero .orbit .t .ic{font-size:26px;}
  .hero .merge{font-size:13px;color:var(--accent);font-weight:700;}

  /* ---- controls ---- */
  .controls{width:100%;max-width:1120px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .progress{flex:1;min-width:180px;height:7px;background:var(--border);border-radius:999px;
    overflow:hidden;}
  .progress .bar{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent-2));
    border-radius:999px;}
  .dots{display:flex;gap:7px;flex-wrap:wrap;}
  .dots button{width:11px;height:11px;border-radius:50%;border:0;padding:0;cursor:pointer;
    background:var(--border);transition:transform .2s,background .2s;}
  .dots button.on{background:var(--accent);transform:scale(1.25);}
  .dots button:focus-visible,.ctl:focus-visible{outline:3px solid var(--accent-2);outline-offset:2px;}
  .ctl{border:1px solid var(--border);background:var(--surface);color:var(--ink);
    width:40px;height:40px;border-radius:11px;cursor:pointer;font-size:16px;display:grid;
    place-items:center;box-shadow:var(--shadow-sm);transition:transform .15s;}
  .ctl:hover{transform:translateY(-1px);}
  .ctl.play{width:auto;padding:0 18px;gap:8px;font-weight:700;font-size:14px;
    background:var(--accent);color:#fff;border-color:transparent;}
  .count{font-size:12.5px;color:var(--ink-sub);font-variant-numeric:tabular-nums;font-weight:600;
    min-width:42px;text-align:center;}
  .hint{max-width:1120px;width:100%;font-size:12.5px;color:var(--ink-sub);
    background:var(--surface);border:1px dashed var(--border);border-radius:12px;
    padding:11px 15px;display:flex;gap:9px;align-items:center;}
  .hint b{color:var(--accent);}

  @media (max-width:720px){
    .slide{grid-template-columns:1fr;}
    .slide .vis{display:none;}
    .slide .txt{justify-content:center;}
    .stage{aspect-ratio:4/5;}
  }
  @media (prefers-reduced-motion:reduce){
    .slide{transition:opacity .2s;transform:none;}
    .progress .bar{transition:none!important;}
  }
</style>

<div class="wrap">
  <div class="brandbar">
    <div class="brand">
      <div class="logo">📑</div>
      <div><b>統合支払明細ビューア</b><span>NELTEC 業務システム</span></div>
    </div>
    <div class="audience">ドライバー・取引先のみなさま向け</div>
  </div>

  <div class="stage" id="stage" aria-live="polite"></div>

  <div class="controls">
    <button class="ctl" id="prev" title="前へ" aria-label="前のスライド">‹</button>
    <button class="ctl play" id="play" aria-label="再生・一時停止"><span id="playIcon">❚❚</span><span id="playTxt">再生中</span></button>
    <button class="ctl" id="next" title="次へ" aria-label="次のスライド">›</button>
    <span class="count" id="count">1 / 8</span>
    <div class="progress"><div class="bar" id="bar"></div></div>
    <button class="ctl" id="restart" title="最初から" aria-label="最初から">↺</button>
    <div class="dots" id="dots"></div>
  </div>

  <div class="hint">🎬 <span><b>画面録画</b>すると、そのまま説明動画（MP4）になります。全画面にして録画→ナレーションを重ねればスタッフ配布用の動画が完成します。</span></div>
</div>

<script>
  const slides = [
    {
      kicker:'はじめに', step:null,
      title:'あなたのお支払いを、ひとつの画面で。',
      lead:'新聞・アスクル・デリバリー、3つの業務のお支払明細を、スマホでもPCでもいつでも確認できます。',
      pts:['毎月の<b>お支払額</b>がすぐわかる','<b>支払通知書</b>をPDFで保存・印刷','<b>インボイス番号</b>も自分で登録'],
      vis:`<div class="hero">
        <div class="orbit">
          <div class="t"><span class="ic">📰</span>新聞シフト</div>
          <div class="t"><span class="ic">📦</span>アスクル</div>
          <div class="t"><span class="ic">🚚</span>デリバリー</div>
        </div>
        <div class="merge">▼ ひとつの明細にまとまる ▼</div>
        <div class="device"><div class="dev-top"><span class="dot"></span>統合支払明細ビューア</div>
          <div class="dev-body"><div class="total"><span class="lb">今月のお支払額</span><span class="amt">¥312,480</span></div></div></div>
      </div>`
    },
    {
      kicker:'ログイン', step:1,
      title:'NexPortと同じIDでログイン',
      lead:'新しいIDを覚える必要はありません。ふだんお使いのNexPortと同じメール・パスワードでそのまま入れます。',
      pts:['メールアドレス＋パスワードを入力','<b>NexPortと共通</b>だから覚えることゼロ','法人の担当者アカウントにも対応'],
      vis:`<div class="device"><div class="dev-top"><span class="dot"></span>ログイン</div>
        <div class="dev-body">
          <div class="fld"><label>メールアドレス</label><div class="box ph">example@neltec.jp</div></div>
          <div class="fld"><label>パスワード</label><div class="box ph">NexPort と同じパスワード</div></div>
          <div class="btnp">ログイン</div>
          <div style="font-size:10.5px;color:var(--ink-sub);text-align:center;">NexPort と同じメール・パスワードでログイン</div>
        </div></div>`
    },
    {
      kicker:'月をえらぶ', step:2,
      title:'見たい月を選ぶだけ',
      lead:'対象月を切り替えると、その月のお支払明細が表示されます。過去の月もさかのぼって確認できます。',
      pts:['<b>対象月</b>を「‹ ›」で切り替え','過去分もいつでも見返せる','業務ごとにタブで切り替え'],
      vis:`<div class="device"><div class="dev-top"><span class="dot"></span>対象月をえらぶ</div>
        <div class="dev-body">
          <div class="month"><span class="nav">‹</span><span>2026年 7月分</span><span class="nav">›</span></div>
          <div class="tabs"><div class="tab on">すべて</div><div class="tab">新聞</div><div class="tab">アスクル</div><div class="tab">デリバリー</div></div>
        </div></div>`
    },
    {
      kicker:'明細を見る', step:3,
      title:'3つの業務の明細がひとつに',
      lead:'外注費（税抜）に消費税、そこから控除を引いた最終のお支払額まで一覧で。日別の内訳も確認できます。',
      pts:['業務ごとの金額を<b>まとめて表示</b>','<b>適格請求書</b>なら消費税10%を上乗せ','マイナス（控除）は赤で色分け'],
      vis:`<div class="device"><div class="dev-top"><span class="dot"></span>2026年7月分 明細</div>
        <div class="dev-body">
          <div class="row"><span class="lb">外注費（税抜）</span><span class="vv">¥298,000</span></div>
          <div class="row"><span class="lb">消費税（適格・10%）</span><span class="vv pos">＋¥29,800</span></div>
          <div class="row"><span class="lb">控除（立替・手数料など）</span><span class="vv neg">−¥35,670</span></div>
          <div class="total"><span class="lb">お支払額</span><span class="amt">¥292,130</span></div>
        </div></div>`
    },
    {
      kicker:'PDF保存', step:4,
      title:'支払通知書をPDFで保存',
      lead:'「個別 / PDF」ボタンから、支払通知書を保存・印刷できます。金額は会計と同じ計算式（お支払額＝(外注費−計算手数料)×1.1−控除）です。',
      pts:['ワンタップで<b>PDF出力</b>','会計ツールと<b>金額・体裁が一致</b>','会社まとめ（法人）のPDFも発行'],
      vis:`<div class="paper">
        <h4>支 払 通 知 書</h4><div class="sub">2026年7月分 ／ 御中</div>
        <div class="pr"><span>外注費（税抜）</span><span>¥298,000</span></div>
        <div class="pr"><span>消費税（適格10%）</span><span>¥29,800</span></div>
        <div class="pr"><span>控除</span><span>−¥35,670</span></div>
        <div class="pr tot"><span>お支払額</span><span>¥292,130</span></div>
        <div class="stamp">NELTEC<br>承認</div>
      </div>`
    },
    {
      kicker:'インボイス', step:5,
      title:'インボイス番号は自分で登録',
      lead:'登録番号（T＋13桁）を入力して保存するだけ。会計に自動で反映され、正式名称で通知書に記載されます。',
      pts:['<b>T＋13桁</b>を入力して保存','会計マスタに<b>自動反映</b>','適格請求書として通知書に記載'],
      vis:`<div class="device"><div class="dev-top"><span class="dot"></span>🧾 インボイス番号の登録</div>
        <div class="dev-body">
          <div class="fld"><label>インボイス番号（T＋13桁）</label><div class="box">T1234567890123</div></div>
          <div class="btnp">保存する</div>
          <div style="display:flex;justify-content:center;"><span class="chip">✓ 会計に反映済み</span></div>
        </div></div>`
    },
    {
      kicker:'登録情報', step:6,
      title:'電話番号の変更もかんたん',
      lead:'明細はあなたの電話番号でひもづいています。番号が変わったら「📱電話変更」から更新してください。',
      pts:['「<b>📱電話変更</b>」で番号を更新','明細は電話番号でひもづく','変更後もこれまでの明細はそのまま'],
      vis:`<div class="device"><div class="dev-top"><span class="dot"></span>📱 電話番号の変更</div>
        <div class="dev-body">
          <div class="fld"><label>電話番号</label><div class="box">090-1234-5678</div></div>
          <div class="btnp">保存</div>
          <div class="btn-ghost">キャンセル</div>
        </div></div>`
    },
    {
      kicker:'まとめ', step:null,
      title:'いつでも、どこでも、自分の明細を。',
      lead:'ログイン → 月をえらぶ → 確認。たったの3ステップ。困ったときは担当者までお気軽に。',
      pts:['スマホ・PCどちらでもOK','過去の明細もいつでも見返せる','ご不明点は担当者へご連絡ください'],
      vis:`<div class="recap">
        <div class="rstep"><div class="n">1</div><div><b>ログイン</b><p>NexPortと同じメール・パスワード</p></div></div>
        <div class="rstep"><div class="n">2</div><div><b>月をえらぶ</b><p>見たい月に切り替え</p></div></div>
        <div class="rstep"><div class="n">3</div><div><b>確認・保存</b><p>明細を見てPDFで保存</p></div></div>
      </div>`
    }
  ];

  const DUR = 7200;
  const stage = document.getElementById('stage');
  const dotsWrap = document.getElementById('dots');
  const bar = document.getElementById('bar');
  const count = document.getElementById('count');
  const playIcon = document.getElementById('playIcon');
  const playTxt = document.getElementById('playTxt');
  const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
  let idx = 0, playing = true, timer = null;

  slides.forEach((s,i)=>{
    const el = document.createElement('div');
    el.className = 'slide';
    el.innerHTML = `
      <div class="txt">
        <div class="kicker">${s.step?`<span class="step">${s.step}</span>`:''}${s.kicker}</div>
        <h2 class="title">${s.title}</h2>
        <p class="lead">${s.lead}</p>
        <ul class="pts">${s.pts.map(p=>`<li>${p}</li>`).join('')}</ul>
      </div>
      <div class="vis">${s.vis}</div>`;
    stage.appendChild(el);
    const b = document.createElement('button');
    b.setAttribute('aria-label',`スライド${i+1}へ`);
    b.addEventListener('click',()=>{go(i);});
    dotsWrap.appendChild(b);
  });
  const slideEls = [...stage.children];
  const dotEls = [...dotsWrap.children];

  function render(){
    slideEls.forEach((el,i)=>el.classList.toggle('active',i===idx));
    dotEls.forEach((el,i)=>el.classList.toggle('on',i===idx));
    count.textContent = `${idx+1} / ${slides.length}`;
  }
  function startBar(){
    bar.style.transition='none'; bar.style.width='0%';
    void bar.offsetWidth;
    if(!reduce && playing){
      bar.style.transition=`width ${DUR}ms linear`; bar.style.width='100%';
    } else if(!playing){
      bar.style.width=getComputedStyle(bar).width;
    }
  }
  function schedule(){
    clearTimeout(timer);
    if(playing){ timer=setTimeout(()=>go(idx+1), DUR); }
  }
  function go(n){
    idx = (n+slides.length)%slides.length;
    render(); startBar(); schedule();
  }
  function setPlaying(p){
    playing = p;
    playIcon.textContent = p?'❚❚':'▶';
    playTxt.textContent = p?'再生中':'一時停止中';
    if(p){ startBar(); schedule(); }
    else { clearTimeout(timer); bar.style.transition='none'; bar.style.width=getComputedStyle(bar).width; }
  }

  document.getElementById('play').addEventListener('click',()=>setPlaying(!playing));
  document.getElementById('next').addEventListener('click',()=>{go(idx+1);});
  document.getElementById('prev').addEventListener('click',()=>{go(idx-1);});
  document.getElementById('restart').addEventListener('click',()=>{go(0);setPlaying(true);});
  addEventListener('keydown',e=>{
    if(e.key===' '){e.preventDefault();setPlaying(!playing);}
    else if(e.key==='ArrowRight')go(idx+1);
    else if(e.key==='ArrowLeft')go(idx-1);
  });

  render(); startBar(); schedule();
</script>
