<title>統合支払明細ビューア｜社内オペレーションガイド</title>
<style>
  :root{
    --jp:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic UI","Yu Gothic","Noto Sans JP",Meiryo,system-ui,sans-serif;
    --accent:#0e7490; --accent-2:#0891b2; --accent-soft:#e2f4f8;
    --indigo:#4f46e5; --indigo-soft:#eef0ff;
    --ground:#f2f6f7; --surface:#ffffff; --surface-2:#f8fbfc;
    --ink:#12222a; --ink-sub:#516069; --border:#dde7ea;
    --amber:#d97706; --rose:#e11d48; --emerald:#059669;
    --shadow:0 14px 46px rgba(14,60,74,.13); --shadow-sm:0 4px 16px rgba(14,60,74,.09);
    --radius:18px;
  }
  @media (prefers-color-scheme:dark){
    :root{
      --accent:#22b8cf; --accent-2:#38bdf8; --accent-soft:#12303a;
      --indigo:#818cf8; --indigo-soft:#20244a;
      --ground:#0a141a; --surface:#131f26; --surface-2:#18262e;
      --ink:#e9f4f7; --ink-sub:#9db3bc; --border:#254049;
      --shadow:0 16px 50px rgba(0,0,0,.5); --shadow-sm:0 4px 18px rgba(0,0,0,.4);
    }
  }
  :root[data-theme="light"]{
    --accent:#0e7490; --accent-2:#0891b2; --accent-soft:#e2f4f8;
    --indigo:#4f46e5; --indigo-soft:#eef0ff;
    --ground:#f2f6f7; --surface:#ffffff; --surface-2:#f8fbfc;
    --ink:#12222a; --ink-sub:#516069; --border:#dde7ea;
    --shadow:0 14px 46px rgba(14,60,74,.13); --shadow-sm:0 4px 16px rgba(14,60,74,.09);
  }
  :root[data-theme="dark"]{
    --accent:#22b8cf; --accent-2:#38bdf8; --accent-soft:#12303a;
    --indigo:#818cf8; --indigo-soft:#20244a;
    --ground:#0a141a; --surface:#131f26; --surface-2:#18262e;
    --ink:#e9f4f7; --ink-sub:#9db3bc; --border:#254049;
    --shadow:0 16px 50px rgba(0,0,0,.5); --shadow-sm:0 4px 18px rgba(0,0,0,.4);
  }

  *{box-sizing:border-box;}
  body{margin:0;background:var(--ground);color:var(--ink);font-family:var(--jp);
    -webkit-font-smoothing:antialiased;line-height:1.6;}
  .wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;gap:18px;
    padding:24px 20px 40px;}
  .brandbar{width:100%;max-width:1120px;display:flex;align-items:center;justify-content:space-between;
    gap:12px;flex-wrap:wrap;}
  .brand{display:flex;align-items:center;gap:11px;}
  .brand .logo{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;
    background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;font-size:19px;
    box-shadow:var(--shadow-sm);}
  .brand b{font-size:15px;letter-spacing:.02em;}
  .brand span{display:block;font-size:11.5px;color:var(--ink-sub);font-weight:500;margin-top:1px;}
  .audience{font-size:11.5px;font-weight:700;letter-spacing:.06em;color:var(--accent);
    background:var(--accent-soft);padding:6px 13px;border-radius:999px;}

  .stage{width:100%;max-width:1120px;aspect-ratio:16/9;position:relative;background:var(--surface);
    border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;}
  .slide{position:absolute;inset:0;display:grid;grid-template-columns:1fr 1fr;opacity:0;visibility:hidden;
    transition:opacity .55s ease,transform .55s ease;transform:translateY(14px);}
  .slide.active{opacity:1;visibility:visible;transform:none;}
  .slide .txt{padding:clamp(24px,4.2vw,52px);display:flex;flex-direction:column;justify-content:center;
    gap:clamp(12px,1.6vw,20px);}
  .slide .vis{background:var(--surface-2);border-left:1px solid var(--border);display:grid;
    place-items:center;padding:clamp(20px,3.5vw,46px);position:relative;overflow:hidden;}

  .kicker{display:inline-flex;align-items:center;gap:9px;font-size:clamp(11px,1.15vw,13px);
    font-weight:700;letter-spacing:.09em;color:var(--accent);text-transform:uppercase;}
  .kicker .step{background:var(--accent);color:#fff;min-width:26px;height:26px;padding:0 7px;
    border-radius:8px;display:inline-grid;place-items:center;font-size:13px;letter-spacing:0;}
  h2.title{margin:0;font-size:clamp(23px,3.5vw,42px);font-weight:800;line-height:1.22;
    letter-spacing:-.01em;text-wrap:balance;}
  .lead{margin:0;font-size:clamp(14px,1.55vw,18px);color:var(--ink-sub);max-width:40ch;}
  ul.pts{margin:6px 0 0;padding:0;list-style:none;display:flex;flex-direction:column;gap:10px;}
  ul.pts li{position:relative;padding-left:28px;font-size:clamp(13.5px,1.45vw,16.5px);}
  ul.pts li::before{content:"";position:absolute;left:0;top:.52em;width:15px;height:15px;border-radius:5px;
    background:var(--accent-soft);box-shadow:inset 0 0 0 2px var(--accent);}
  ul.pts li b{color:var(--accent);font-weight:700;}

  .device{width:min(100%,360px);background:var(--surface);border:1px solid var(--border);border-radius:16px;
    box-shadow:var(--shadow);overflow:hidden;}
  .dev-top{background:linear-gradient(135deg,var(--accent),var(--accent-2));color:#fff;padding:13px 16px;
    display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:700;}
  .dev-top .dot{width:9px;height:9px;border-radius:50%;background:rgba(255,255,255,.55);}
  .dev-body{padding:16px;display:flex;flex-direction:column;gap:11px;}
  .fld{display:flex;flex-direction:column;gap:5px;}
  .fld label{font-size:11px;color:var(--ink-sub);font-weight:600;}
  .fld .box{border:1px solid var(--border);border-radius:9px;padding:9px 11px;font-size:13px;
    background:var(--surface-2);color:var(--ink);display:flex;align-items:center;gap:8px;}
  .fld .box.ph{color:var(--ink-sub);}
  .btnp{background:var(--accent);color:#fff;text-align:center;padding:11px;border-radius:9px;font-weight:700;
    font-size:14px;box-shadow:var(--shadow-sm);}
  .searchbar{display:flex;gap:7px;}
  .searchbar .box{flex:1;}
  .searchbar .go{background:var(--accent);color:#fff;padding:9px 14px;border-radius:9px;font-weight:700;
    font-size:13px;}
  .listrow{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:10px;
    background:var(--surface-2);border:1px solid var(--border);font-size:12.5px;}
  .listrow .who{display:flex;flex-direction:column;gap:2px;}
  .listrow .who b{font-size:13px;} .listrow .who small{color:var(--ink-sub);font-size:10.5px;}
  .tag{font-size:10px;font-weight:700;padding:3px 8px;border-radius:999px;background:var(--indigo-soft);
    color:var(--indigo);}
  .tag.k{background:var(--accent-soft);color:var(--accent);}
  .row{display:flex;align-items:center;justify-content:space-between;font-size:13px;padding:8px 2px;
    border-bottom:1px dashed var(--border);font-variant-numeric:tabular-nums;}
  .row:last-child{border-bottom:0;} .row .lb{color:var(--ink-sub);} .row .vv{font-weight:700;}
  .neg{color:var(--rose);} .pos{color:var(--emerald);}
  .total{display:flex;align-items:center;justify-content:space-between;margin-top:4px;padding:12px 13px;
    border-radius:11px;background:var(--accent-soft);font-variant-numeric:tabular-nums;}
  .total .lb{font-size:12px;color:var(--accent);font-weight:700;}
  .total .amt{font-size:20px;font-weight:800;color:var(--accent);}
  .chip{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:5px 10px;
    border-radius:999px;background:rgba(5,150,105,.12);color:var(--emerald);}

  /* pipeline diagram */
  .pipe{display:flex;flex-direction:column;gap:11px;width:min(100%,340px);}
  .pnode{display:flex;align-items:center;gap:13px;background:var(--surface);border:1px solid var(--border);
    border-radius:13px;padding:12px 14px;box-shadow:var(--shadow-sm);}
  .pnode .ic{width:38px;height:38px;border-radius:10px;display:grid;place-items:center;font-size:19px;flex:none;
    background:var(--accent-soft);color:var(--accent);}
  .pnode.k2 .ic{background:var(--indigo-soft);color:var(--indigo);}
  .pnode b{font-size:13.5px;} .pnode p{margin:1px 0 0;font-size:11px;color:var(--ink-sub);}
  .parrow{align-self:center;color:var(--accent);font-size:15px;line-height:.5;}

  .paper{width:min(100%,300px);background:#fff;color:#222;border-radius:8px;box-shadow:var(--shadow);
    padding:20px 20px 26px;position:relative;}
  .paper h4{margin:0 0 3px;font-size:15px;letter-spacing:.04em;}
  .paper .sub{font-size:10.5px;color:#888;margin-bottom:13px;}
  .paper .pr{display:flex;justify-content:space-between;font-size:11.5px;padding:5px 0;border-bottom:1px solid #eee;
    font-variant-numeric:tabular-nums;color:#333;}
  .paper .pr.tot{border-bottom:0;font-weight:800;font-size:14px;color:#111;margin-top:4px;}
  .paper .pr.g small{color:#999;font-size:9.5px;}
  .stamp{position:absolute;right:16px;bottom:16px;width:56px;height:56px;border-radius:50%;
    border:2.5px solid var(--rose);color:var(--rose);display:grid;place-items:center;font-size:10px;font-weight:800;
    text-align:center;line-height:1.15;transform:rotate(-11deg);opacity:.85;}
  .recap{display:flex;flex-direction:column;gap:11px;width:min(100%,330px);}
  .rstep{display:flex;align-items:center;gap:13px;background:var(--surface);border:1px solid var(--border);
    border-radius:13px;padding:12px 15px;box-shadow:var(--shadow-sm);}
  .rstep .n{width:30px;height:30px;border-radius:9px;background:var(--accent);color:#fff;display:grid;
    place-items:center;font-weight:800;font-size:14px;flex:none;}
  .rstep b{font-size:14px;} .rstep p{margin:1px 0 0;font-size:11px;color:var(--ink-sub);}

  .controls{width:100%;max-width:1120px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;}
  .progress{flex:1;min-width:180px;height:7px;background:var(--border);border-radius:999px;overflow:hidden;}
  .progress .bar{height:100%;width:0;background:linear-gradient(90deg,var(--accent),var(--accent-2));
    border-radius:999px;}
  .dots{display:flex;gap:7px;flex-wrap:wrap;}
  .dots button{width:11px;height:11px;border-radius:50%;border:0;padding:0;cursor:pointer;background:var(--border);
    transition:transform .2s,background .2s;}
  .dots button.on{background:var(--accent);transform:scale(1.25);}
  .dots button:focus-visible,.ctl:focus-visible{outline:3px solid var(--accent-2);outline-offset:2px;}
  .ctl{border:1px solid var(--border);background:var(--surface);color:var(--ink);width:40px;height:40px;
    border-radius:11px;cursor:pointer;font-size:16px;display:grid;place-items:center;box-shadow:var(--shadow-sm);
    transition:transform .15s;}
  .ctl:hover{transform:translateY(-1px);}
  .ctl.play{width:auto;padding:0 18px;gap:8px;font-weight:700;font-size:14px;background:var(--accent);color:#fff;
    border-color:transparent;}
  .count{font-size:12.5px;color:var(--ink-sub);font-variant-numeric:tabular-nums;font-weight:600;min-width:42px;
    text-align:center;}
  .hint{max-width:1120px;width:100%;font-size:12.5px;color:var(--ink-sub);background:var(--surface);
    border:1px dashed var(--border);border-radius:12px;padding:11px 15px;display:flex;gap:9px;align-items:center;}
  .hint b{color:var(--accent);}

  @media (max-width:720px){
    .slide{grid-template-columns:1fr;}
    .slide .vis{display:none;}
    .slide .txt{justify-content:center;}
    .stage{aspect-ratio:4/5;}
  }
  @media (prefers-reduced-motion:reduce){
    .slide{transition:opacity .2s;transform:none;}
    .progress .bar{transition:none!important;}
  }
</style>

<div class="wrap">
  <div class="brandbar">
    <div class="brand">
      <div class="logo">🗂</div>
      <div><b>統合支払明細ビューア</b><span>社内オペレーションガイド</span></div>
    </div>
    <div class="audience">社内・管理者向け</div>
  </div>

  <div class="stage" id="stage" aria-live="polite"></div>

  <div class="controls">
    <button class="ctl" id="prev" title="前へ" aria-label="前のスライド">‹</button>
    <button class="ctl play" id="play" aria-label="再生・一時停止"><span id="playIcon">❚❚</span><span id="playTxt">再生中</span></button>
    <button class="ctl" id="next" title="次へ" aria-label="次のスライド">›</button>
    <span class="count" id="count">1 / 9</span>
    <div class="progress"><div class="bar" id="bar"></div></div>
    <button class="ctl" id="restart" title="最初から" aria-label="最初から">↺</button>
    <div class="dots" id="dots"></div>
  </div>

  <div class="hint">🎬 <span><b>画面録画</b>すると、そのまま社内研修用の説明動画（MP4）になります。全画面表示にしてから録画してください。</span></div>
</div>

<script>
  const slides = [
    {
      kicker:'社内向け', step:null,
      title:'現場で確定 → 横断で集約 → 会計へ連携',
      lead:'ドライバー・取引先が見る明細ビューアを、社内としてどう運用するか。全体像から管理機能までを解説します。',
      pts:['3ツールの明細を<b>横断集約</b>','管理者は<b>任意の相手</b>の明細を確認','会計マスタと<b>自動連携</b>'],
      vis:`<div class="pipe">
        <div class="pnode"><div class="ic">📰</div><div><b>現場ツール</b><p>新聞 / アスクル / デリバリーで月次を確定</p></div></div>
        <div class="parrow">▼</div>
        <div class="pnode"><div class="ic">📑</div><div><b>統合支払明細ビューア</b><p>電話・氏名・会社名で横断照合して集約</p></div></div>
        <div class="parrow">▼</div>
        <div class="pnode k2"><div class="ic">💹</div><div><b>会計</b><p>インボイス番号・支払通知書へ連携</p></div></div>
      </div>`
    },
    {
      kicker:'アクセス管理', step:1,
      title:'管理者は任意の相手を検索',
      lead:'「管理者：任意電話検索」をオンにすると、電話番号を指定して誰の明細でも確認できます。問い合わせ対応に。',
      pts:['チェックひとつで<b>任意電話検索</b>','電話番号を入力してその人の明細へ','権限は最高管理者／管理者に限定'],
      vis:`<div class="device"><div class="dev-top"><span class="dot"></span>管理者モード</div>
        <div class="dev-body">
          <div class="fld"><label style="display:flex;gap:7px;align-items:center;"><span style="width:15px;height:15px;border-radius:4px;background:var(--accent);display:inline-block;"></span>管理者：任意電話検索</label></div>
          <div class="searchbar"><div class="box ph">電話番号（例 090-1234-5678）</div><div class="go">検索</div></div>
          <div class="listrow"><div class="who"><b>山田 太郎</b><small>090-1234-5678</small></div><span class="tag k">個建</span></div>
        </div></div>`
    },
    {
      kicker:'集計', step:2,
      title:'会社別グループで適格判定＆税込集計',
      lead:'法人（取引先）ごとにグループ化。適格請求書ならグループ単位で消費税10%を上乗せし、税込＋適格チップで表示します。',
      pts:['<b>会社別グループ</b>で法人まとめ','グループ単位で<b>適格判定→消費税上乗せ</b>','行は税込表示・合計＝外注費＋消費税'],
      vis:`<div class="device"><div class="dev-top"><span class="dot"></span>会社別グループ ｜ 2026年7月</div>
        <div class="dev-body">
          <div class="listrow"><div class="who"><b>株式会社○○運送</b><small>ドライバー 6名</small></div><span class="chip">✓ 適格</span></div>
          <div class="row"><span class="lb">外注費（税抜）</span><span class="vv">¥1,284,000</span></div>
          <div class="row"><span class="lb">計算手数料</span><span class="vv neg">−¥5,200</span></div>
          <div class="row"><span class="lb">消費税（適格10%）</span><span class="vv pos">＋¥127,880</span></div>
          <div class="row"><span class="lb">その他控除</span><span class="vv neg">−¥62,400</span></div>
          <div class="total"><span class="lb">お支払額（税込）</span><span class="amt">¥1,344,280</span></div>
        </div></div>`
    },
    {
      kicker:'人材マスタ', step:3,
      title:'区分・会社・電話・番号を1画面で',
      lead:'「🗂 人材マスタ」で、区分（個建／個口／社員…）、所属会社、電話番号、インボイス番号をまとめて管理します。',
      pts:['メンバー情報を<b>1画面で一元管理</b>','区分・会社・電話・インボイスを編集','電話未登録の絞り込みも可能'],
      vis:`<div class="device"><div class="dev-top"><span class="dot"></span>🗂 人材マスタ</div>
        <div class="dev-body">
          <div class="searchbar"><div class="box ph">名前 / 電話 / 会社で検索</div></div>
          <div class="listrow"><div class="who"><b>山田 太郎</b><small>株式会社△△運送 ・ 090-…</small></div><span class="tag">社員</span></div>
          <div class="listrow"><div class="who"><b>佐藤 花子</b><small>サンプル運輸（屋号）・ 090-…</small></div><span class="tag k">個建</span></div>
          <div class="listrow"><div class="who"><b>鈴木 一郎</b><small>電話未登録</small></div><span class="tag" style="background:rgba(217,119,6,.14);color:var(--amber);">要登録</span></div>
        </div></div>`
    },
    {
      kicker:'法人アカウント', step:4,
      title:'法人には「自社の担当者」管理を',
      lead:'取引先の法人アカウントには「🏢 自社の担当者」を提供。ビューアにログインできる担当者を先方自身で管理できます。',
      pts:['法人に<b>担当者管理</b>を委譲','ログイン可能な担当者を追加・編集','自社メンバー分の明細のみ閲覧'],
      vis:`<div class="device"><div class="dev-top"><span class="dot"></span>🏢 自社の担当者</div>
        <div class="dev-body">
          <div class="listrow"><div class="who"><b>担当 A</b><small>a@partner.co.jp</small></div><span class="tag k">管理</span></div>
          <div class="listrow"><div class="who"><b>担当 B</b><small>b@partner.co.jp</small></div><span class="tag">閲覧</span></div>
          <div class="btnp">＋ 担当者を追加</div>
        </div></div>`
    },
    {
      kicker:'インボイス突合', step:5,
      title:'自己登録を正式名称で会計に反映',
      lead:'本人が登録したT番号は、会計マスタの正式名称と照合。一致すれば番号だけ更新し、正式名称を保持します。',
      pts:['本人が<b>T＋13桁を自己登録</b>','会計マスタと<b>正式名称で照合</b>','未一致の法人は要登録として通知'],
      vis:`<div class="pipe">
        <div class="pnode"><div class="ic">🧾</div><div><b>本人が自己登録</b><p>T1234567890123 を保存</p></div></div>
        <div class="parrow">▼</div>
        <div class="pnode k2"><div class="ic">🔍</div><div><b>正式名称で照合</b><p>会計マスタ（exact → 正規化）</p></div></div>
        <div class="parrow">▼</div>
        <div class="pnode"><div class="ic">✅</div><div><b>番号だけ更新</b><p>正式名称は保持したまま反映</p></div></div>
      </div>`
    },
    {
      kicker:'支払通知書', step:6,
      title:'会計と同一の計算式で通知書を発行',
      lead:'計算手数料を課税前に▲、消費税＝(外注費−計算手数料)×10%（適格のみ）、お支払額＝(外注費−計算手数料)×1.1−その他控除。立替金も▲控除に反映します。',
      pts:['会計と<b>金額・計算式が完全一致</b>','計算手数料・立替金を<b>▲控除</b>で反映','法人まとめは荷主別フォルダでZIP出力'],
      vis:`<div class="paper">
        <h4>支 払 通 知 書</h4><div class="sub">2026年7月分 ／ 株式会社○○ 御中</div>
        <div class="pr g"><span>外注費（税抜）<small>（適格）</small></span><span>¥1,284,000</span></div>
        <div class="pr"><span>計算手数料</span><span>▲¥5,200</span></div>
        <div class="pr"><span>消費税（10%）</span><span>¥127,880</span></div>
        <div class="pr"><span>立替金・その他控除</span><span>▲¥62,400</span></div>

      pts:['<b>発行はタイマー（自動）</b>。手動送信ボタンは無し','異議は<b>確定保留</b>（pay-statement-object）→担当者が確認','3日無連絡→<b>4日目に自動受領確定</b>'],

      pts:['荷主別の<b>基礎データで自動確定</b>','5日／25日の確定サイクルを想定','新聞の全自動確定は移植を進行中'],
      vis:`<div class="pipe">
        <div class="pnode"><div class="ic">📦</div><div><b>基礎データ</b><p>ヤマト/アスクル＝配送完了・新聞ほか＝シフト</p></div></div>

      pts:['問い合わせは<b>任意電話検索</b>で即応','情報の正は<b>人材マスタ</b>で整備','会計連携は<b>正式名称照合</b>が原則'],
      vis:`<div class="recap">

  const DUR = 7600;
  const stage = document.getElementById('stage');
  const dotsWrap = document.getElementById('dots');
  const bar = document.getElementById('bar');
  const count = document.getElementById('count');
  const playIcon = document.getElementById('playIcon');
  const playTxt = document.getElementById('playTxt');
  const reduce = matchMedia('(prefers-reduced-motion:reduce)').matches;
  let idx = 0, playing = true, timer = null;

  slides.forEach((s,i)=>{
    const el = document.createElement('div');
    el.className = 'slide';
    el.innerHTML = `
      <div class="txt">
        <div class="kicker">${s.step?`<span class="step">${s.step}</span>`:''}${s.kicker}</div>
        <h2 class="title">${s.title}</h2>
        <p class="lead">${s.lead}</p>
        <ul class="pts">${s.pts.map(p=>`<li>${p}</li>`).join('')}</ul>
      </div>
      <div class="vis">${s.vis}</div>`;
    stage.appendChild(el);
    const b = document.createElement('button');
    b.setAttribute('aria-label',`スライド${i+1}へ`);
    b.addEventListener('click',()=>{go(i);});
    dotsWrap.appendChild(b);
  });
  const slideEls = [...stage.children];
  const dotEls = [...dotsWrap.children];

  function render(){
    slideEls.forEach((el,i)=>el.classList.toggle('active',i===idx));
    dotEls.forEach((el,i)=>el.classList.toggle('on',i===idx));
    count.textContent = `${idx+1} / ${slides.length}`;
  }
  function startBar(){
    bar.style.transition='none'; bar.style.width='0%';
    void bar.offsetWidth;
    if(!reduce && playing){ bar.style.transition=`width ${DUR}ms linear`; bar.style.width='100%'; }
    else if(!playing){ bar.style.width=getComputedStyle(bar).width; }
  }
  function schedule(){ clearTimeout(timer); if(playing){ timer=setTimeout(()=>go(idx+1), DUR); } }
  function go(n){ idx=(n+slides.length)%slides.length; render(); startBar(); schedule(); }
  function setPlaying(p){
    playing=p;
    playIcon.textContent=p?'❚❚':'▶'; playTxt.textContent=p?'再生中':'一時停止中';
    if(p){ startBar(); schedule(); }
    else { clearTimeout(timer); bar.style.transition='none'; bar.style.width=getComputedStyle(bar).width; }
  }

  document.getElementById('play').addEventListener('click',()=>setPlaying(!playing));
  document.getElementById('next').addEventListener('click',()=>{go(idx+1);});
  document.getElementById('prev').addEventListener('click',()=>{go(idx-1);});
  document.getElementById('restart').addEventListener('click',()=>{go(0);setPlaying(true);});
  addEventListener('keydown',e=>{
    if(e.key===' '){e.preventDefault();setPlaying(!playing);}
    else if(e.key==='ArrowRight')go(idx+1);
    else if(e.key==='ArrowLeft')go(idx-1);
  });

  render(); startBar(); schedule();
</script>
