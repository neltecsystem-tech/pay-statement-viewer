<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>統合支払明細ビューア</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📑%3C/text%3E%3C/svg%3E">
<style>
:root{
  --primary:#4f46e5;--primary-d:#4338ca;--bg:#f8fafc;--card:#ffffff;
  --border:#e2e8f0;--text:#0f172a;--text-sub:#64748b;--danger:#dc2626;
  --success:#16a34a;--warning:#f59e0b;
  --shift:#0ea5e9;--askul:#f97316;--delivery:#10b981;
}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}
.container{max-width:900px;margin:0 auto;padding:16px;}
header{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-d) 100%);color:#fff;padding:18px 20px;border-radius:12px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
header h1{margin:0;font-size:18px;font-weight:700;}
header .sub{font-size:12px;opacity:.85;margin-top:2px;}
.btn{background:var(--primary);color:#fff;border:none;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;}
.btn:hover{background:var(--primary-d);}
.btn-secondary{background:#fff;color:var(--primary);border:1px solid #fff;}
.btn-secondary:hover{background:#eef2ff;}
.btn-danger{background:var(--danger);color:#fff;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;}
.btn-ghost{background:transparent;color:var(--text-sub);border:1px solid var(--border);padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;}
.input{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:14px;background:#fff;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;}
.card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;color:#fff;}
.badge-shift{background:var(--shift);}
.badge-askul{background:var(--askul);}
.badge-delivery{background:var(--delivery);}
.status-pill{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;}
.status-final{background:#dcfce7;color:#166534;}
.status-draft{background:#fef3c7;color:#92400e;}
.status-none{background:#f1f5f9;color:#64748b;}
.amount-big{font-size:24px;font-weight:700;color:var(--text);}
.amount-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px;}
.amount-row .label{color:var(--text-sub);}
.amount-row .value{font-weight:600;}
.divider{height:1px;background:var(--border);margin:8px 0;}
table.detail{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
table.detail th{background:#f1f5f9;padding:5px;border:1px solid #cbd5e1;text-align:center;}
table.detail td{padding:4px 6px;border:1px solid #e2e8f0;}
table.detail tr.sun{background:#fee2e2;}
table.detail tr.sat{background:#fef3c7;}
.center{text-align:center;}
.right{text-align:right;}
.muted{color:var(--text-sub);font-size:12px;}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
.login-screen{max-width:380px;margin:60px auto;padding:32px;background:#fff;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,.08);}
.login-screen h2{margin:0 0 18px;text-align:center;font-size:20px;color:var(--primary);}
.login-screen .field{margin-bottom:12px;}
.login-screen label{display:block;font-size:12px;color:var(--text-sub);margin-bottom:4px;}
.login-screen input{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:14px;}
.login-screen .err{color:var(--danger);font-size:13px;margin-bottom:10px;display:none;}
.login-screen .btn-block{width:100%;padding:12px;font-size:15px;}
.detail-toggle{background:none;border:none;color:var(--primary);cursor:pointer;font-size:12px;padding:0;margin-top:6px;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #c7d2fe;border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;color:var(--text-sub);padding:24px;font-size:13px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;justify-content:center;align-items:center;padding:20px;}
.modal{background:#fff;border-radius:14px;padding:28px;max-width:380px;width:100%;}
.modal h3{margin:0 0 8px;font-size:18px;}
.modal p{margin:0 0 16px;font-size:13px;color:var(--text-sub);}
.summary-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.summary-label{font-size:13px;color:var(--text-sub);}
.summary-value{font-size:14px;font-weight:600;}
.grand-total-card{background:linear-gradient(135deg,#fef3c7,#fde68a);border:2px solid var(--warning);border-radius:12px;padding:16px;margin-bottom:16px;text-align:center;}
.grand-total-card .label{font-size:12px;color:#92400e;font-weight:600;}
.grand-total-card .value{font-size:30px;font-weight:700;color:#92400e;margin-top:4px;}
@media(max-width:600px){
  .container{padding:10px;}
  header{padding:14px;}
  header h1{font-size:16px;}
  .amount-big{font-size:20px;}
  .grand-total-card .value{font-size:24px;}
}
</style>
</head>
<body>

<div id="app">
  <div class="container">
    <div id="screen-login" class="login-screen">
      <h2>📑 統合支払明細ビューア</h2>
      <div class="field">
        <label>メールアドレス</label>
        <input type="email" id="login-email" autocomplete="email" placeholder="example@neltec.jp">
      </div>
      <div class="field">
        <label>パスワード</label>
        <input type="password" id="login-pw" autocomplete="current-password" placeholder="NexPort と同じパスワード">
      </div>
      <div class="err" id="login-err"></div>
      <button class="btn btn-block" onclick="doLogin()">ログイン</button>
      <p class="muted" style="margin-top:14px;text-align:center;font-size:11px;">
        NexPort と同じメール・パスワードでログインしてください。<br>
        アカウントが無い方は管理者にお問い合わせください。
      </p>
    </div>

    <div id="screen-main" style="display:none;">
      <header>
        <div>
          <h1>📑 統合支払明細ビューア</h1>
          <div class="sub" id="hdr-user">読み込み中...</div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="btn btn-secondary" id="btn-open-admin" onclick="openAdminScreen()" title="メンバー管理" style="display:none;">👥 メンバー管理</button>
          <button class="btn btn-secondary" onclick="changePhone()" title="登録電話番号を変更">📱 電話変更</button>
          <button class="btn btn-secondary" onclick="doLogout()">ログアウト</button>
        </div>
      </header>

      <div class="toolbar">
        <label>対象月:</label>
        <input type="month" id="ym-input" class="input">
        <button class="btn" onclick="loadAll()">読み込み</button>
        <button class="btn btn-pdf" id="btn-summary-pdf" onclick="downloadSummaryPdf()" disabled style="background:#0ea5e9;">📄 サマリーPDF</button>
        <button class="btn-ghost" id="btn-all-pdf" onclick="downloadAllPdf()" disabled>📦 全部一括PDF</button>
        <span id="admin-toggle-wrap" style="display:none;margin-left:auto;">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
            <input type="checkbox" id="admin-mode-cb" onchange="toggleAdminMode()"> 管理者: 任意電話検索
          </label>
        </span>
      </div>

      <div id="admin-phone-bar" style="display:none;margin-bottom:14px;">
        <div class="card" style="background:#fef3c7;border-color:#f59e0b;">
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px;">
            <span style="font-weight:600;font-size:13px;">🔍 他人の明細検索:</span>
            <input type="text" id="admin-name-input" class="input" placeholder="名前で検索 (例: 小林)" style="flex:1;min-width:160px;">
            <span style="font-size:12px;color:#92400e;">または</span>
            <input type="tel" id="admin-phone-input" class="input" placeholder="電話番号 (例 090-1234-5678)" style="flex:1;min-width:180px;">
            <button class="btn" onclick="adminSearch()">検索</button>
          </div>
          <div id="admin-name-results" style="display:none;margin-top:6px;background:#fff;border-radius:6px;border:1px solid var(--border);max-height:240px;overflow-y:auto;"></div>
        </div>
      </div>

      <div id="result-area"></div>
    </div>

    <!-- 管理者: メンバー管理画面 -->
    <div id="screen-admin" style="display:none;">
      <header>
        <div>
          <h1>👥 メンバー管理</h1>
          <div class="sub" id="hdr-admin-user">読み込み中...</div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="btn btn-secondary" onclick="closeAdminScreen()">← 明細ビューアに戻る</button>
          <button class="btn btn-secondary" onclick="doLogout()">ログアウト</button>
        </div>
      </header>

      <div class="card" style="margin-bottom:12px;">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;">
          <input type="text" id="admin-mbr-search" class="input" placeholder="名前/電話/会社で検索" style="flex:1;min-width:200px;">
          <select id="admin-mbr-filter" class="input" onchange="renderMemberList()">
            <option value="all">すべて</option>
            <option value="admins">管理者のみ</option>
            <option value="members">一般メンバーのみ</option>
            <option value="owners">法人オーナーのみ</option>
            <option value="no_phone">電話未登録のみ</option>
            <option value="no_site">現場未設定のみ</option>
            <option value="hidden">🔒 金額非表示のみ</option>
          </select>
          <select id="admin-mbr-groupby" class="input" onchange="renderMemberList()" title="表示モード">
            <option value="none">個人一覧</option>
            <option value="company">会社別グループ</option>
          </select>
          <button class="btn" onclick="loadMembers()">🔄 再読み込み</button>
          <button class="btn" onclick="autoFillSites()" title="各ツール (新聞/アスクル/デリバリー) のデータから配属現場を自動補完" style="background:#10b981;">📥 ツールから自動補完</button>
        </div>
        <div style="font-size:12px;color:var(--text-sub);">
          <span id="admin-mbr-count">読み込み中...</span>
        </div>
      </div>

      <div id="admin-mbr-list-area"></div>
    </div>
  </div>
</div>

<!-- メンバー編集モーダル (管理者画面用) -->
<div id="member-edit-modal" style="display:none;" class="modal-overlay">
  <div class="modal" style="max-width:480px;">
    <h3 id="mem-edit-title">メンバー編集</h3>
    <div style="margin-bottom:10px;">
      <label style="display:block;font-size:12px;color:var(--text-sub);margin-bottom:4px;">表示名</label>
      <input type="text" id="mem-edit-name" class="input" style="width:100%;">
    </div>
    <div style="margin-bottom:10px;">
      <label style="display:block;font-size:12px;color:var(--text-sub);margin-bottom:4px;">電話番号</label>
      <input type="tel" id="mem-edit-phone" class="input" style="width:100%;" placeholder="例 090-1234-5678">
    </div>
    <div style="margin-bottom:10px;">
      <label style="display:block;font-size:12px;color:var(--text-sub);margin-bottom:4px;">会社</label>
      <input type="text" id="mem-edit-company" class="input" style="width:100%;" placeholder="例: 株式会社○○ など" list="company-suggestions">
      <datalist id="company-suggestions"></datalist>
    </div>
    <div style="margin-bottom:10px;">
      <label style="display:block;font-size:12px;color:var(--text-sub);margin-bottom:4px;">役職</label>
      <input type="text" id="mem-edit-position" class="input" style="width:100%;">
    </div>
    <div style="margin-bottom:10px;">
      <label style="display:block;font-size:12px;color:var(--text-sub);margin-bottom:4px;">📍 配属現場</label>
      <input type="text" id="mem-edit-site" class="input" style="width:100%;" placeholder="例: 立川 / ヤマト / アスクル など" list="site-suggestions">
      <datalist id="site-suggestions"></datalist>
    </div>
    <div style="margin-bottom:14px;">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;">
        <input type="checkbox" id="mem-edit-owner">
        <span>👑 法人オーナー (このフラグ ON で、 法人ドライバーでも自分の金額を見られる)</span>
      </label>
    </div>

    <!-- 差引項目 (毎月適用される控除) -->
    <div style="margin-bottom:14px;padding:12px;background:#fef9c3;border-radius:8px;border:1px solid #fde047;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-size:13px;font-weight:600;color:#854d0e;">💸 差引項目 (毎月自動で引かれる金額)</span>
        <button type="button" class="btn-ghost" onclick="addDeductionRow()" style="font-size:11px;padding:3px 8px;">+ 追加</button>
      </div>
      <div id="mem-edit-deductions"></div>
      <div style="font-size:11px;color:#92400e;margin-top:6px;">例: リース代 39000、 制服代 5000 など。 合計支払額から自動で差し引かれます。</div>
    </div>

    <div id="mem-edit-err" style="color:var(--danger);font-size:12px;margin-bottom:10px;display:none;"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn-ghost" onclick="closeMemberEdit()">キャンセル</button>
      <button class="btn" id="mem-edit-save-btn" onclick="saveMemberEdit()">保存</button>
    </div>
  </div>
</div>

<!-- PDF生成用 オフスクリーン領域 -->
<div id="pdf-stage" aria-hidden="true" style="position:absolute;left:-99999px;top:0;width:760px;background:#fff;font-family:'Yu Gothic UI','Hiragino Sans',sans-serif;color:#0f172a;"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
'use strict';

const SUPABASE_URL='https://nccognptoprhwsbjnwcu.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jY29nbnB0b3ByaHdzYmpud2N1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDU0NDEsImV4cCI6MjA4OTkyMTQ0MX0.M3h31uPyKYWlNevVW3OvZOonoTidC1KLZ04sB5nRKzU';
const ASKUL_URL='https://erfcsnzdooswgpvgrapb.supabase.co/functions/v1/pay-statement-by-phone';
const ASKUL_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyZmNzbnpkb29zd2dwdmdyYXBiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NDE3MDYsImV4cCI6MjA5MjQxNzcwNn0.TdP1S8kReDi-ZY0xtL5e8cZc_WsVMLSukY1zSQHNmCQ';
const DELIVERY_URL='https://ymdaakiwxkjotlmzveom.supabase.co/functions/v1/pay-statement-by-phone';
const DELIVERY_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InltZGFha2l3eGtqb3RsbXp2ZW9tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Njk4MjMsImV4cCI6MjA5NDE0NTgyM30.7T-1IjHuaxORPC31FQ7U6U7o-00_cJzUJIywQqxgrZ8';
const SHIFT_URL=SUPABASE_URL+'/functions/v1/pay-statement-by-phone';

const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON);

let session=null;
let profile=null;// ログイン中のユーザー
let targetProfile=null;// 現在表示中のドライバー (自分 or 検索した他人)
let currentData=null;// {shift, askul, delivery, ym, phone}

function $(id){return document.getElementById(id);}

function normalizePhone(s){
  if(!s)return '';
  return String(s).replace(/[０-９]/g,ch=>String.fromCharCode(ch.charCodeAt(0)-0xff10+0x30)).replace(/[^\d]/g,'');
}

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function fmtYen(n){return '¥'+Math.round(Number(n)||0).toLocaleString();}

function thisMonth(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

async function doLogin(){
  const email=$('login-email').value.trim();
  const pw=$('login-pw').value;
  const err=$('login-err');
  err.style.display='none';
  if(!email||!pw){err.textContent='メールとパスワードを入力してください';err.style.display='block';return;}
  const {data,error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){err.textContent='ログイン失敗: '+error.message;err.style.display='block';return;}
  session=data.session;
  await postLogin();
}

async function postLogin(){
  // profile を取得
  const {data,error}=await sb.from('profiles').select('id, display_name, role, phone, is_company_owner').eq('id',session.user.id).maybeSingle();
  if(error||!data){
    alert('プロファイルが見つかりません: '+(error?.message||'unknown'));
    return doLogout();
  }
  profile=data;
  $('screen-login').style.display='none';
  $('screen-main').style.display='block';
  $('hdr-user').textContent=`${profile.display_name||session.user.email}${(profile.role==='admin'||profile.role==='super_admin')?' (管理者)':''}`;
  $('ym-input').value=thisMonth();
  if(profile.role==='admin'||profile.role==='super_admin'){
    $('admin-toggle-wrap').style.display='inline-flex';
    $('btn-open-admin').style.display='inline-flex';
  }

  if(!profile.phone){
    await promptPhone();
  }
  if(profile.phone)loadAll();
}

async function promptPhone(){
  return new Promise(resolve=>{
    const overlay=document.createElement('div');
    overlay.className='modal-overlay';
    overlay.innerHTML=`<div class="modal">
      <h3>📱 電話番号を登録</h3>
      <p>支払明細を表示するために、電話番号を登録してください (初回のみ)。新聞シフト/アスクル/デリバリー で登録されている番号と同じものを入力してください。</p>
      <input type="tel" id="reg-phone" class="input" placeholder="例 090-1234-5678" style="width:100%;margin-bottom:8px;">
      <div id="reg-err" style="color:var(--danger);font-size:12px;margin-bottom:8px;display:none;"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button class="btn-ghost" onclick="cancelPhonePrompt()">後で</button>
        <button class="btn" onclick="savePhonePrompt()">登録</button>
      </div>
    </div>`;
    document.body.appendChild(overlay);
    window._phonePromptResolve=resolve;
    window._phonePromptOverlay=overlay;
  });
}

window.cancelPhonePrompt=function(){
  if(window._phonePromptOverlay)window._phonePromptOverlay.remove();
  if(window._phonePromptResolve)window._phonePromptResolve();
};

window.savePhonePrompt=async function(){
  const raw=$('reg-phone').value;
  const phone=normalizePhone(raw);
  const err=$('reg-err');
  err.style.display='none';
  if(!phone||phone.length<10){err.textContent='正しい電話番号を入力してください';err.style.display='block';return;}
  const {error}=await sb.from('profiles').update({phone}).eq('id',session.user.id);
  if(error){err.textContent='保存失敗: '+error.message;err.style.display='block';return;}
  profile.phone=phone;
  if(window._phonePromptOverlay)window._phonePromptOverlay.remove();
  if(window._phonePromptResolve)window._phonePromptResolve();
};

async function changePhone(){
  const cur=profile.phone||'';
  const raw=prompt(`登録電話番号: ${cur||'(未登録)'}\n新しい番号を入力してください (ハイフン可):`,cur);
  if(raw===null)return;
  const phone=normalizePhone(raw);
  if(!phone||phone.length<10){alert('正しい電話番号を入力してください');return;}
  const {error}=await sb.from('profiles').update({phone}).eq('id',session.user.id);
  if(error){alert('保存失敗: '+error.message);return;}
  profile.phone=phone;
  alert('✓ 電話番号を更新しました');
  loadAll();
}

async function doLogout(){
  await sb.auth.signOut();
  session=null;profile=null;targetProfile=null;currentData=null;
  $('screen-main').style.display='none';
  $('screen-login').style.display='block';
  $('login-email').value='';$('login-pw').value='';
  $('result-area').innerHTML='';
  $('btn-summary-pdf').disabled=true;
  $('btn-all-pdf').disabled=true;
}

function toggleAdminMode(){
  const on=$('admin-mode-cb').checked;
  $('admin-phone-bar').style.display=on?'block':'none';
}

function loadAll(){
  const phone=profile.phone;
  if(!phone){alert('電話番号が未登録です');return;}
  loadFor(phone);
}

function loadByPhone(){
  const raw=$('admin-phone-input').value;
  const phone=normalizePhone(raw);
  if(!phone||phone.length<10){alert('電話番号を入力してください');return;}
  loadFor(phone);
}

async function adminSearch(){
  const name=$('admin-name-input').value.trim();
  const phoneRaw=$('admin-phone-input').value.trim();
  if(phoneRaw){
    const phone=normalizePhone(phoneRaw);
    if(phone.length>=10){loadFor(phone);return;}
  }
  if(!name){alert('名前または電話番号を入力してください');return;}
  await searchByName(name);
}

async function searchByName(query){
  const results=$('admin-name-results');
  results.style.display='block';
  results.innerHTML='<div style="padding:10px;color:var(--text-sub);font-size:12px;"><span class="spinner"></span> 検索中...</div>';
  const {data,error}=await sb.from('profiles').select('id, display_name, phone, role, company, position, is_company_owner').ilike('display_name','%'+query+'%').not('phone','is',null).limit(30);
  if(error){results.innerHTML=`<div style="padding:10px;color:var(--danger);font-size:12px;">検索エラー: ${escHtml(error.message)}</div>`;return;}
  if(!data||!data.length){
    results.innerHTML=`<div style="padding:10px;color:var(--text-sub);font-size:12px;">該当者なし (電話番号未登録の人は出ません)</div>`;
    return;
  }
  const canEditOwner=profile?.role==='super_admin';
  results.innerHTML=data.map(p=>{
    const sub=[p.company,p.position].filter(Boolean).join(' / ');
    const adminTag=(p.role==='admin'||p.role==='super_admin')?'<span style="background:#e0e7ff;color:#3730a3;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:6px;">管理者</span>':'';
    const ownerTag=p.is_company_owner?'<span style="background:#fef3c7;color:#92400e;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:6px;">👑 オーナー</span>':'';
    const ownerToggle=canEditOwner?`<button onclick="event.stopPropagation();toggleOwner('${escHtml(p.id)}',${!p.is_company_owner})" style="background:transparent;border:1px dashed var(--border);padding:3px 7px;border-radius:6px;font-size:10px;cursor:pointer;color:var(--text-sub);">${p.is_company_owner?'オーナー解除':'オーナー設定'}</button>`:'';
    return `<div onclick="pickName('${escHtml(p.phone)}','${escHtml(p.display_name||'')}')" style="padding:8px 12px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:10px;" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background=''">
      <div>
        <div style="font-weight:600;font-size:13px;">${escHtml(p.display_name||'(名前未設定)')}${adminTag}${ownerTag}</div>
        ${sub?`<div style="font-size:11px;color:var(--text-sub);margin-top:2px;">${escHtml(sub)}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
        <div style="font-size:11px;color:var(--text-sub);font-family:monospace;">${escHtml(p.phone)}</div>
        ${ownerToggle}
      </div>
    </div>`;
  }).join('');
}

window.toggleOwner=async function(profileId,newValue){
  if(!confirm(newValue?'この人を法人オーナーに設定しますか?\n→ 自分の支払明細を見られるようになります':'オーナー設定を解除しますか?\n→ 法人ドライバー扱いになり、自分の金額は見られなくなります'))return;
  const {error}=await sb.from('profiles').update({is_company_owner:newValue}).eq('id',profileId);
  if(error){alert('更新失敗: '+error.message);return;}
  // 直近の検索を再実行して反映
  if($('admin-name-input').value.trim())await searchByName($('admin-name-input').value.trim());
  // 現在表示中の人なら targetProfile も更新
  if(targetProfile?.id===profileId){
    targetProfile.is_company_owner=newValue;
    if(currentData)renderResults(currentData);
  }
};

window.pickName=function(phone,name){
  $('admin-phone-input').value=phone;
  $('admin-name-input').value=name;
  $('admin-name-results').style.display='none';
  loadFor(normalizePhone(phone));
};

async function loadTargetProfile(phone){
  // ログイン中ユーザー自身ならその profile を流用
  if(profile?.phone && normalizePhone(profile.phone)===phone){
    targetProfile=profile;
    return;
  }
  // 電話番号で NexPort profiles を逆引き (オーナー判定用)
  const {data}=await sb.from('profiles').select('id, display_name, phone, role, is_company_owner').not('phone','is',null);
  targetProfile=(data||[]).find(p=>normalizePhone(p.phone||'')===phone)||null;
}

async function loadFor(phone){
  const ym=$('ym-input').value;
  if(!ym){alert('対象月を選択してください');return;}
  const area=$('result-area');
  area.innerHTML='<div class="card center"><div class="spinner"></div> 3ツールに問い合わせ中...</div>';
  await loadTargetProfile(phone);

  const callEf=async (url,anon)=>{
    try{
      const userJwt=session?.access_token||'';
      const resp=await fetch(url,{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+anon},
        body:JSON.stringify({phone,year_month:ym,auth_token:userJwt})
      });
      if(resp.status===401)return {error:'認証エラー',code:'AUTH'};
      if(resp.status===403)return {error:'この明細にアクセスする権限がありません',code:'FORBIDDEN'};
      if(!resp.ok)return {error:`HTTP ${resp.status}`};
      return await resp.json();
    }catch(e){return {error:e.message};}
  };

  // 差引項目を並列取得 (targetProfile.id で SELECT、 RLS で本人 or admin が見える)
  const deductionsFetch=async()=>{
    if(!targetProfile?.id)return [];
    const {data}=await sb.from('member_deductions').select('id, label, amount, active').eq('profile_id',targetProfile.id).eq('active',true).order('sort_order').order('created_at');
    return data||[];
  };

  const [shift,askul,delivery,deductions]=await Promise.all([
    callEf(SHIFT_URL,SUPABASE_ANON),
    callEf(ASKUL_URL,ASKUL_ANON),
    callEf(DELIVERY_URL,DELIVERY_ANON),
    deductionsFetch(),
  ]);

  renderResults({shift,askul,delivery,deductions,ym,phone});
}

function renderResults({shift,askul,delivery,deductions,ym,phone}){
  currentData={shift,askul,delivery,deductions:deductions||[],ym,phone};
  const area=$('result-area');
  const toolTotal=calcTotal({shift,askul,delivery});
  const foundCount=[shift,askul,delivery].filter(r=>r&&r.found).length;
  const deds=(deductions||[]).filter(d=>d.active);
  const deductionTotal=deds.reduce((s,d)=>s+(Number(d.amount)||0),0);
  const grandTotal=toolTotal-deductionTotal;
  $('btn-summary-pdf').disabled=foundCount===0;
  $('btn-all-pdf').disabled=foundCount===0;

  let html='';
  if(foundCount>0){
    if(deductionTotal>0){
      html+=`<div class="grand-total-card">
        <div class="label">${escHtml(ym)} 差引後 合計支払額 (${foundCount}ツール)</div>
        <div class="value">${fmtYen(grandTotal)}</div>
        <div style="font-size:11px;color:#92400e;margin-top:6px;">ツール合計 ${fmtYen(toolTotal)} − 差引 ${fmtYen(deductionTotal)}</div>
      </div>`;
    }else{
      html+=`<div class="grand-total-card">
        <div class="label">${escHtml(ym)} 合計支払額 (${foundCount}ツール)</div>
        <div class="value">${fmtYen(toolTotal)}</div>
      </div>`;
    }
  }

  // 差引項目カード (active なものが 1 件以上ある場合のみ表示)
  if(deds.length>0){
    html+=`<div class="card" style="border-color:#fbbf24;background:#fffbeb;">
      <div class="card-header"><span style="font-weight:700;color:#92400e;">💸 差引項目</span></div>
      ${deds.map(d=>`<div class="amount-row"><span class="label">${escHtml(d.label)}</span><span class="value" style="color:#dc2626;">−${fmtYen(d.amount)}</span></div>`).join('')}
      <div class="divider"></div>
      <div class="amount-row"><span class="label" style="font-weight:600;">差引合計</span><span class="value" style="color:#dc2626;font-weight:700;">−${fmtYen(deductionTotal)}</span></div>
    </div>`;
  }

  html+=renderShiftCard(shift,ym);
  html+=renderAskulCard(askul,ym);
  html+=renderDeliveryCard(delivery,ym);

  if(foundCount===0){
    html+=`<div class="card empty">
      <div style="font-size:32px;margin-bottom:8px;">🔎</div>
      <div>該当データなし</div>
      <div class="muted" style="margin-top:6px;">電話番号 ${escHtml(phone)} は3ツールいずれにも登録されていないか、${escHtml(ym)} のデータがありません。</div>
    </div>`;
  }

  area.innerHTML=html;
}

function pdfBtn(source,disabled){
  return `<button class="btn-ghost" style="margin-left:auto;font-size:11px;padding:4px 8px;" ${disabled?'disabled':''} onclick="downloadToolPdf('${source}')">📄 PDF</button>`;
}

function renderShiftCard(r,ym){
  let body='';
  if(r?.error){
    body=`<div class="empty" style="color:var(--danger);">エラー: ${escHtml(r.error)}</div>`;
  }else if(!r?.found){
    body=`<div class="empty">この月の確定明細はまだ公開されていません</div>`;
  }else{
    body=(r.statements||[]).map(s=>{
      const finalized=s.finalized_at?new Date(s.finalized_at).toLocaleString('ja-JP'):'';
      const modified=s.modified_at?` / 修正 ${new Date(s.modified_at).toLocaleString('ja-JP')}`:'';
      const hide=shouldHide(s,'shift');
      return `<div style="border-top:1px dashed var(--border);padding-top:10px;margin-top:10px;">
        <div class="summary-row"><span class="summary-label">スタッフ</span><span class="summary-value">${escHtml(s.staff_name)}${s.primary_area?` (${escHtml(s.primary_area)})`:''}</span></div>
        ${hide?hideMsg():`
        <div class="summary-row"><span class="summary-label">朝刊合計</span><span class="summary-value">${fmtYen(s.am_sum)}</span></div>
        <div class="summary-row"><span class="summary-label">夕刊合計</span><span class="summary-value">${fmtYen(s.pm_sum)}</span></div>
        <div class="amount-row" style="border-top:1px solid var(--border);margin-top:6px;padding-top:8px;"><span class="label">月合計</span><span class="amount-big">${fmtYen(s.grand_total)}</span></div>
        `}
        <div class="muted" style="margin-top:6px;">確定 ${finalized}${modified}</div>
        ${hide?'':`<button class="detail-toggle" onclick="toggleDetail(this)">📅 日別を見る</button>
        <div class="detail-body" style="display:none;">${renderShiftDetail(s.rows||[])}</div>`}
      </div>`;
    }).join('');
  }
  return `<div class="card">
    <div class="card-header"><span class="badge badge-shift">新聞シフト</span>
      <span class="status-pill ${r?.found?'status-final':'status-none'}">${r?.found?'確定済':'未公開'}</span>
      ${pdfBtn('shift',!r?.found)}
    </div>
    ${body}
  </div>`;
}

window.toggleDetail=function(btn){
  const body=btn.nextElementSibling;
  if(body.style.display==='none'){body.style.display='block';btn.textContent='📅 日別を閉じる';}
  else{body.style.display='none';btn.textContent='📅 日別を見る';}

// ===== PDF 生成 =====

function calcTotal({shift,askul,delivery}){
  return (shift?.statements||[]).reduce((s,r)=>s+(shouldHide(r,'shift')?0:(r.grand_total||0)),0)
        +(askul?.statements||[]).reduce((s,r)=>s+(shouldHide(r,'askul')?0:(r.payment_amount||0)),0)
        +(delivery?.statements||[]).reduce((s,r)=>s+(shouldHide(r,'delivery')?0:(r.payment_amount||0)),0);
}

// 法人 (非オーナー) / 社員 は金額非表示。管理者 (admin/super_admin) は常に表示。
// オーナーは NexPort profiles.is_company_owner で判定 (shift では biz_type='法人' でも見える)
function shouldHide(stmt,source){
  if(profile?.role==='admin'||profile?.role==='super_admin')return false;
  const isOwner=targetProfile?.is_company_owner===true;
  if(isOwner)return false;
  if(source==='shift')return stmt.biz_type==='法人';
  return stmt.business_type==='corporation'||stmt.business_type==='employee';
}

function hideMsg(){return '<div class="muted" style="padding:6px 10px;background:#f1f5f9;border-radius:6px;font-size:11px;">※ 法人所属 / 社員区分のため金額は非表示 (会社オーナーまたは管理者にお問い合わせください)</div>';}

function ownerName(){
  if(!currentData)return '';
  const s=currentData.shift?.statements?.[0];
  if(s?.staff_name)return s.staff_name;
  const a=currentData.askul?.statements?.[0];
  if(a?.driver_name)return a.driver_name;
  const d=currentData.delivery?.statements?.[0];
  if(d?.driver_name)return d.driver_name;
  return profile?.display_name||'';
}

function safeFile(s){return String(s||'').replace(/[\\/:*?"<>|]/g,'_');}

function eraLabel(y,m){
  const reiwa=y-2018;
  const era=reiwa>=1?`令和${reiwa===1?'元':reiwa}年`:`西暦${y}年`;
  return `${era} ${m}月度`;
}

// オフスクリーンに DOM を描画 → html2canvas → jsPDF 化 → blob を返す
async function renderToPdfBlob(html){
  const stage=$('pdf-stage');
  stage.innerHTML=html;
  // 描画タイミング待ち
  await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
  const target=stage.firstElementChild;
  const canvas=await html2canvas(target,{scale:2,backgroundColor:'#ffffff',useCORS:true,logging:false});
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const pdfWidth=pdf.internal.pageSize.getWidth();
  const pdfHeight=pdf.internal.pageSize.getHeight();
  const imgHeight=(canvas.height*pdfWidth)/canvas.width;
  let heightLeft=imgHeight,position=0;
  const data=canvas.toDataURL('image/jpeg',0.95);
  pdf.addImage(data,'JPEG',0,position,pdfWidth,imgHeight);
  heightLeft-=pdfHeight;
  while(heightLeft>0){
    position=heightLeft-imgHeight;
    pdf.addPage();
    pdf.addImage(data,'JPEG',0,position,pdfWidth,imgHeight);
    heightLeft-=pdfHeight;
  }
  stage.innerHTML='';
  return pdf;
}

// ----- サマリーPDF (支払通知書フォーマット: サンプル準拠) -----
function buildSummaryHtml(){
  if(!currentData)return '';
  const {shift,askul,delivery,ym}=currentData;
  const [y,m]=ym.split('-').map(Number);
  const fmtNum=n=>Math.round(Number(n)||0).toLocaleString();
  const total=calcTotal(currentData);
  const shiftTotal=(shift?.statements||[]).reduce((s,r)=>s+(shouldHide(r,'shift')?0:(r.grand_total||0)),0);
  const askulTotal=(askul?.statements||[]).reduce((s,r)=>s+(shouldHide(r,'askul')?0:(r.payment_amount||0)),0);
  const deliveryTotal=(delivery?.statements||[]).reduce((s,r)=>s+(shouldHide(r,'delivery')?0:(r.payment_amount||0)),0);
  const shiftHidden=(shift?.statements||[]).some(r=>shouldHide(r,'shift'));
  const askulHidden=(askul?.statements||[]).some(r=>shouldHide(r,'askul'));
  const deliveryHidden=(delivery?.statements||[]).some(r=>shouldHide(r,'delivery'));
  const owner=ownerName();
  // 車両リース料などの控除はビューアに未連携 (将来 NELTEC 会計から連携)
  const lease=Number(currentData.vehicle_lease||0);
  const subtotal=total+lease;       // 小計 = お支払額 + 車両リース料
  const payAmount=total;            // お支払額 / 合計金額
  // 振込先 (将来 NELTEC 会計の口座情報を連携。今は任意フィールド or 空欄)
  const bank=currentData.bank_account||targetProfile?.bank_account||'';
  const mgmtNo=`N-${y}${String(m).padStart(2,'0')}`;
  const issueDate=`${new Date().getFullYear()}年${new Date().getMonth()+1}月${new Date().getDate()}日`;

  // 摘要テーブル行 (ツールごと)。先頭行のみ ドライバー/年月 を表示
  const tools=[];
  if((shift?.statements||[]).length)   tools.push({label:'新聞シフト 配達業務委託',total:shiftTotal,hidden:shiftHidden});
  if((askul?.statements||[]).length)   tools.push({label:'ASKUL LOGIST 配送業務委託',total:askulTotal,hidden:askulHidden});
  if((delivery?.statements||[]).length)tools.push({label:'デリバリー 配送業務委託',total:deliveryTotal,hidden:deliveryHidden});
  const MIN_ROWS=7;
  let tbody='';
  for(let i=0;i<Math.max(MIN_ROWS,tools.length);i++){
    const t=tools[i];
    const zebra=i%2===1?'#f8fafc':'#fff';
    const cell='border-bottom:1px solid #e5e7eb;padding:9px 10px;font-size:12px;';
    if(t){
      tbody+=`<tr style="background:${zebra};">
        <td style="${cell}text-align:center;">${i===0?escHtml(owner):''}</td>
        <td style="${cell}text-align:center;white-space:nowrap;">${i===0?escHtml(eraLabel(y,m)):''}</td>
        <td style="${cell}">${escHtml(t.label)}${i===0?'<div style="font-size:10px;color:#6b7280;margin-top:2px;">詳細は別紙のとおり</div>':''}</td>
        <td style="${cell}text-align:right;font-weight:600;">${t.hidden?'非表示':fmtNum(t.total)}</td>
      </tr>`;
    }else{
      tbody+=`<tr style="background:${zebra};"><td style="${cell}">&nbsp;</td><td style="${cell}"></td><td style="${cell}"></td><td style="${cell}"></td></tr>`;
    }
  }

  const bar='background:#111;height:14px;';
  return `<div style="width:760px;box-sizing:border-box;background:#fff;font-family:'Yu Gothic UI','Hiragino Sans','Hiragino Kaku Gothic Pro',sans-serif;color:#111;padding:30px 40px 36px;">
    <div style="${bar}margin-bottom:18px;"></div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:18px;">
      <h1 style="margin:0;font-size:30px;font-weight:800;letter-spacing:6px;">支払通知書</h1>
      <div style="text-align:right;font-size:12px;line-height:1.8;">
        <div>${issueDate}</div>
        <div>管理番号：${escHtml(mgmtNo)}</div>
      </div>
    </div>

    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;">
      <div style="flex:1;padding-right:24px;">
        <div style="font-size:20px;font-weight:700;border-bottom:1.5px solid #111;padding-bottom:4px;display:inline-block;min-width:230px;">${escHtml(owner)}<span style="font-size:14px;font-weight:400;margin-left:24px;">様</span></div>
        <div style="font-size:12px;margin-top:14px;">下記のとおりお支払い申し上げます。</div>
        <div style="display:flex;align-items:flex-end;gap:18px;margin-top:18px;">
          <div style="font-size:14px;font-weight:600;">お支払額</div>
          <div style="font-size:26px;font-weight:800;letter-spacing:1px;">${fmtNum(payAmount)}</div>
        </div>
      </div>
      <div style="position:relative;width:250px;font-size:12px;line-height:1.85;padding-top:2px;">
        <div style="font-weight:700;">株式会社ＮＥＬＴＥＣ</div>
        <div>〒170-0005</div>
        <div>東京都豊島区南大塚2-38-1</div>
        <div>リードシー大塚ビル5F-7号室</div>
        <div>TEL: 090-9295-0785</div>
        <div>FAX: 03-4243-3498</div>
        <img src="${STAMP_DATA_URI}" alt="印" style="position:absolute;top:-6px;right:0;width:74px;height:74px;transform:rotate(-7deg);" />
      </div>
    </div>

    <div style="${bar}margin:6px 0 0;"></div>
    <table style="width:100%;border-collapse:collapse;">
      <thead><tr>
        <th style="padding:8px 10px;font-size:12px;border-bottom:1.5px solid #111;text-align:center;width:20%;">ドライバー</th>
        <th style="padding:8px 10px;font-size:12px;border-bottom:1.5px solid #111;text-align:center;width:16%;">年月</th>
        <th style="padding:8px 10px;font-size:12px;border-bottom:1.5px solid #111;text-align:left;">摘要</th>
        <th style="padding:8px 10px;font-size:12px;border-bottom:1.5px solid #111;text-align:right;width:18%;">金額</th>
      </tr></thead>
      <tbody>${tbody}</tbody>
    </table>

    <div style="${bar}margin:0 0 12px;"></div>
    <div style="display:flex;justify-content:flex-end;">
      <table style="border-collapse:collapse;font-size:13px;min-width:300px;">
        <tr><td style="padding:4px 14px;text-align:right;color:#374151;">小計</td><td style="padding:4px 6px;text-align:right;font-weight:600;min-width:110px;">${fmtNum(subtotal)}</td></tr>
        <tr><td style="padding:4px 14px;text-align:right;color:#374151;">車両リース料</td><td style="padding:4px 6px;text-align:right;font-weight:600;">${lease?('-'+fmtNum(lease)):'0'}</td></tr>
      </table>
    </div>

    <div style="border-top:1px solid #111;margin:8px 0 0;"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;">
      <div style="font-size:11px;color:#374151;">＊お振込手数料はご負担をお願い致します</div>
      <div style="display:flex;align-items:center;gap:24px;"><div style="font-size:14px;font-weight:700;">合計金額</div><div style="font-size:20px;font-weight:800;min-width:120px;text-align:right;">${fmtNum(payAmount)}</div></div>
    </div>
    <div style="border-top:1px solid #111;margin:0 0 8px;"></div>
    <div style="text-align:center;font-size:12px;padding:6px 0 14px;">振込先 / ${bank?escHtml(bank):'<span style="color:#9ca3af;">（NELTEC会計の口座情報を連携予定）</span>'}</div>

    <div style="text-align:center;color:#d33;font-weight:700;font-size:15px;margin-top:6px;">仕分例</div>
    <div style="text-align:center;color:#d33;font-size:12px;line-height:1.9;margin-top:4px;">
      外注委託費　${fmtNum(subtotal)}　/　買掛金　${fmtNum(payAmount)}　/　${m}月分　/　${escHtml(owner)}　/　区分表示　/　80％経過措置
      ${lease?`<br>車両リース売上　${fmtNum(lease)}`:'<br>車両リース売上　0'}
    </div>
  </div>`;
}

// ----- 新聞シフト 詳細PDF -----
function buildShiftDetailHtml(){
  if(!currentData?.shift?.found)return '';
  const {shift,ym}=currentData;
  const [y,m]=ym.split('-').map(Number);
  const s=shift.statements[0];
  if(!s)return '';
  if(shouldHide(s,'shift')){
    return `<div style="padding:32px;width:760px;background:#fff;font-family:'Yu Gothic UI','Hiragino Sans',sans-serif;text-align:center;color:#64748b;">
      <h2 style="color:#0ea5e9;">📰 新聞シフト</h2>
      <div style="padding:40px;background:#f8fafc;border-radius:8px;margin-top:20px;">法人/社員区分のため金額は非表示</div>
    </div>`;
  }
  let h=`<div style="padding:32px;width:760px;box-sizing:border-box;background:#fff;font-family:'Yu Gothic UI','Hiragino Sans',sans-serif;">`;
  h+=`<div style="display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #0ea5e9;padding-bottom:10px;margin-bottom:16px;">
    <div><div style="font-size:11px;color:#64748b;">📰 新聞シフト 別紙明細書</div>
    <h2 style="margin:4px 0 0;font-size:20px;color:#0ea5e9;">${escHtml(eraLabel(y,m))}</h2></div>
    <div style="text-align:right;font-size:15px;font-weight:600;">${escHtml(s.staff_name)}${s.primary_area?`<div style="font-size:11px;color:#64748b;margin-top:2px;">主稼働: ${escHtml(s.primary_area)}</div>`:''}</div>
  </div>`;

async function downloadAllPdf(){
  if(!currentData)return;
  const btn=$('btn-all-pdf');
  btn.disabled=true;const old=btn.textContent;btn.textContent='⏳ 生成中...';
  try{
    // 1つの PDF にサマリー + 各ツール詳細を結合
    const sections=[buildSummaryHtml()];
    if(currentData.shift?.found)sections.push(buildShiftDetailHtml());
    if(currentData.askul?.found)sections.push(buildAskulDetailHtml());
    if(currentData.delivery?.found)sections.push(buildDeliveryDetailHtml());
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pdfWidth=pdf.internal.pageSize.getWidth();
    const pdfHeight=pdf.internal.pageSize.getHeight();
    const stage=$('pdf-stage');
    for(let i=0;i<sections.length;i++){
      stage.innerHTML=sections[i];
      await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
      const target=stage.firstElementChild;
      const canvas=await html2canvas(target,{scale:2,backgroundColor:'#ffffff',useCORS:true,logging:false});
      const imgHeight=(canvas.height*pdfWidth)/canvas.width;
      let heightLeft=imgHeight,position=0;
      if(i>0)pdf.addPage();
      const data=canvas.toDataURL('image/jpeg',0.95);
      pdf.addImage(data,'JPEG',0,position,pdfWidth,imgHeight);
      heightLeft-=pdfHeight;
      while(heightLeft>0){
        position=heightLeft-imgHeight;
        pdf.addPage();
        pdf.addImage(data,'JPEG',0,position,pdfWidth,imgHeight);
        heightLeft-=pdfHeight;
      }
    }
    stage.innerHTML='';
    const fname=safeFile(`${currentData.ym}_統合明細_${ownerName()}.pdf`);
    pdf.save(fname);
  }catch(e){alert('PDF生成失敗: '+e.message);}
  btn.textContent=old;btn.disabled=false;
}

// 失敗しても datalist の NexPort 分は出るので握りつぶす。
async function loadToolCompanies(){
  const fetchRpc=async(base,key)=>{

        method:'POST',headers:{'Content-Type':'application/json','apikey':key,'Authorization':'Bearer '+key},body:'{}',
      });
      if(!r.ok)return [];
      const rows=await r.json();
      return (rows||[]).map(x=>x.company_name).filter(Boolean);
    }catch(_){return [];}
  };
  const [askul,delivery]=await Promise.all([
    fetchRpc('https://erfcsnzdooswgpvgrapb.supabase.co',ASKUL_ANON),
    fetchRpc('https://ymdaakiwxkjotlmzveom.supabase.co',DELIVERY_ANON),
  ]);

}

// 金額が「本人から見て非表示」になる電話番号 (正規化済み) の集合。
// 非表示条件 = 法人/社員区分の非オーナー。 admin/super_admin は除外 (本人は自分の金額が見える)。
let hiddenPhones=new Set();
async function loadBizTypes(){
  const fetchRpc=async(base,key)=>{
    try{
      const r=await fetch(base+'/rest/v1/rpc/get_biz_type_map',{
        method:'POST',headers:{'Content-Type':'application/json','apikey':key,'Authorization':'Bearer '+key},body:'{}',
      });
      if(!r.ok)return [];
      return await r.json()||[];
    }catch(_){return [];}
  };
  const nexportRpc=async()=>{ try{const {data}=await sb.rpc('get_biz_type_map');return data||[];}catch(_){return [];} };
  const [shift,askul,delivery]=await Promise.all([
    nexportRpc(),
    fetchRpc('https://erfcsnzdooswgpvgrapb.supabase.co',ASKUL_ANON),
    fetchRpc('https://ymdaakiwxkjotlmzveom.supabase.co',DELIVERY_ANON),
  ]);
  const s=new Set();
  // 新聞: biz_type==='法人' で非表示
  shift.forEach(r=>{const np=normalizePhone(r.phone);if(np&&r.biz_type==='法人')s.add(np);});
  // askul/delivery: business_type が corporation / employee で非表示
  const hideBiz=bt=>bt==='corporation'||bt==='employee';
  askul.forEach(r=>{const np=normalizePhone(r.phone);if(np&&hideBiz(r.business_type))s.add(np);});
  delivery.forEach(r=>{const np=normalizePhone(r.phone);if(np&&hideBiz(r.business_type))s.add(np);});
  hiddenPhones=s;
}

// メンバー本人視点で金額が非表示になるか
function isAmountHidden(m){
  if(m.is_company_owner)return false;               // オーナーは見える
  if(m.role==='admin'||m.role==='super_admin')return false; // 管理者は本人でも見える
  const np=normalizePhone(m.phone);
  if(!np)return false;                              // 電話未登録は判定不能 → 印なし
  return hiddenPhones.has(np);
}

  }

function renderMemberList(){
  const search=($('admin-mbr-search').value||'').trim().toLowerCase();
  const filter=$('admin-mbr-filter').value;
  const listArea=$('admin-mbr-list-area');

  let list=allMembers.slice();
  if(filter==='admins')list=list.filter(p=>p.role==='admin'||p.role==='super_admin');
  else if(filter==='members')list=list.filter(p=>p.role!=='admin'&&p.role!=='super_admin');
  else if(filter==='owners')list=list.filter(p=>!!p.is_company_owner);
  else if(filter==='no_phone')list=list.filter(p=>!p.phone);
  else if(filter==='no_site')list=list.filter(p=>!p.site);
  else if(filter==='hidden')list=list.filter(p=>isAmountHidden(p));

  if(search){
    const q=search;
    list=list.filter(p=>
      (p.display_name||'').toLowerCase().includes(q)||
      (p.phone||'').includes(q)||
      (p.company||'').toLowerCase().includes(q)||
      (p.position||'').toLowerCase().includes(q)||
      (p.site||'').toLowerCase().includes(q)
    );
  }

  $('admin-mbr-count').textContent=`${list.length}件 / 全${allMembers.length}件`;

  if(list.length===0){
    listArea.innerHTML='<div class="empty">該当するメンバーがいません</div>';
    return;
  }

  const groupBy=($('admin-mbr-groupby')||{}).value||'none';
  // 会社名の正規化 (半角/全角・前後空白・株式会社プレフィックス除去で同一視)
  const normalizeCompany=(s)=>{
    if(!s)return '';
    let n=String(s).trim();
    // 全角→半角の英数字変換
    n=n.replace(/[Ａ-Ｚａ-ｚ０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
    n=n.replace(/\s+/g,'').toLowerCase();
    n=n.replace(/^株式会社|^(株)|（株）|株式会社$|(株)$/g,'');
    return n;
  };

  const renderRow=(p)=>{
    const adminTag=(p.role==='super_admin')?'<span style="background:#fde68a;color:#92400e;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:6px;">最高管理者</span>'
      :(p.role==='admin')?'<span style="background:#e0e7ff;color:#3730a3;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:6px;">管理者</span>':'';
    const ownerTag=p.is_company_owner?'<span style="background:#fef3c7;color:#92400e;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:6px;">👑 オーナー</span>':'';
    const pendingTag=p.account_status==='pending_approval'?'<span style="background:#fee2e2;color:#991b1b;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:6px;">承認待ち</span>':'';
    const hiddenTag=isAmountHidden(p)?'<span title="法人/社員区分のため本人は自分の金額を見られません。 👑オーナー設定で表示可" style="background:#f3e8ff;color:#6b21a8;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:6px;">🔒 金額非表示</span>':'';
    const sub=[(groupBy==='company'?null:p.company),p.position,p.employment_type].filter(Boolean).join(' / ');
    const siteStr=p.site
      ? `<span style="background:#dbeafe;color:#1e40af;padding:1px 8px;border-radius:8px;font-size:10px;font-weight:600;">📍 ${escHtml(p.site)}</span>`
      : '<span style="background:#f1f5f9;color:#94a3b8;padding:1px 8px;border-radius:8px;font-size:10px;">📍 現場未設定</span>';
    const phoneStr=p.phone?escHtml(p.phone):'<span style="color:var(--danger);">未登録</span>';
    return `<div class="mbr-row" style="display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border);">
      <div style="flex:1;min-width:0;">
        <div style="font-weight:600;font-size:14px;">${escHtml(p.display_name||'(名前未設定)')}${adminTag}${ownerTag}${pendingTag}${hiddenTag}</div>
        <div style="margin-top:4px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
          ${siteStr}
          ${sub?`<span style="font-size:11px;color:var(--text-sub);">${escHtml(sub)}</span>`:''}
        </div>
      </div>
      <div style="font-size:12px;font-family:monospace;color:var(--text-sub);white-space:nowrap;">${phoneStr}</div>
      <button class="btn-ghost" onclick="openMemberEdit('${escHtml(p.id)}')">編集</button>
    </div>`;
  };

  if(groupBy==='company'){
    // 会社別にグループ化 (正規化キーで集約、 表示名は元データの最頻値を使用)
    const groups=new Map(); // normalizedKey → { displayName, members: [] }
    for(const p of list){
      const key=normalizeCompany(p.company);
      const disp=key?(p.company||'').trim():'(会社未設定)';
      if(!groups.has(key))groups.set(key,{displayName:disp,members:[]});
      groups.get(key).members.push(p);
    }
    // ソート: 会社未設定を最後、 それ以外はメンバー数降順
    const arr=[...groups.entries()].sort((a,b)=>{
      if(!a[0]&&b[0])return 1;
      if(a[0]&&!b[0])return -1;
      return b[1].members.length-a[1].members.length;
    });
    let html='';
    for(const [key,g] of arr){
      const ownerCnt=g.members.filter(m=>m.is_company_owner).length;
      const adminCnt=g.members.filter(m=>m.role==='admin'||m.role==='super_admin').length;
      const phoneSetCnt=g.members.filter(m=>!!m.phone).length;
      html+=`<details class="card" style="padding:0;overflow:hidden;margin-bottom:10px;" ${key?'open':''}>
        <summary style="padding:12px 14px;background:#f1f5f9;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:14px;font-weight:600;list-style:none;">
          <span>🏢 ${escHtml(g.displayName)}</span>
          <span style="font-size:11px;color:var(--text-sub);font-weight:400;">
            ${g.members.length}名${ownerCnt?` / 👑 ${ownerCnt}`:''}${adminCnt?` / 管理 ${adminCnt}`:''} / 📞 ${phoneSetCnt}/${g.members.length}
          </span>
        </summary>
        <div>${g.members.map(renderRow).join('')}</div>
      </details>`;
    }
    listArea.innerHTML=html;
  }else{
    const rows=list.map(renderRow).join('');
    listArea.innerHTML=`<div class="card" style="padding:0;overflow:hidden;">${rows}</div>`;
  }
}

window.openMemberEdit=async function(id){
  const p=allMembers.find(m=>m.id===id);
  if(!p){alert('メンバーが見つかりません');return;}
  $('mem-edit-title').textContent=`✏ ${p.display_name||'(無名)'} を編集`;
  $('mem-edit-name').value=p.display_name||'';
  $('mem-edit-phone').value=p.phone||'';
  $('mem-edit-company').value=p.company||'';
  $('mem-edit-position').value=p.position||'';
  $('mem-edit-site').value=p.site||'';
  $('mem-edit-owner').checked=!!p.is_company_owner;
  // 既に登録済みの site 値を datalist のサジェストに反映
  const uniqueSites=[...new Set(allMembers.map(m=>m.site).filter(Boolean))].sort();
  $('site-suggestions').innerHTML=uniqueSites.map(s=>`<option value="${escHtml(s)}">`).join('');
  // 会社名サジェスト: NexPort profiles の既登録会社名 + 各ツール (askul/delivery) の
  // 所属法人名をマージ (タイポ・表記ゆれ防止)
  const nexportCompanies=allMembers.map(m=>(m.company||'').trim()).filter(Boolean);
  const uniqueCompanies=[...new Set([...nexportCompanies,...toolCompanies.map(c=>(c||'').trim()).filter(Boolean)])].sort();
  $('company-suggestions').innerHTML=uniqueCompanies.map(c=>`<option value="${escHtml(c)}">`).join('');
  $('mem-edit-err').style.display='none';
  $('mem-edit-save-btn').dataset.id=id;
  $('member-edit-modal').style.display='flex';
  // 差引項目を取得して表示
  $('mem-edit-deductions').innerHTML='<div style="color:var(--text-sub);font-size:11px;padding:4px 0;">読み込み中...</div>';
  const {data:deds}=await sb.from('member_deductions').select('id, label, amount, active').eq('profile_id',id).order('sort_order').order('created_at');
  $('mem-edit-deductions').innerHTML='';
  (deds||[]).forEach(d=>addDeductionRow(d));
};

  row.className='dedu-row';
  row.dataset.id=item?.id||'';
  row.style.cssText='background:#fff;border:1px solid #fde047;border-radius:6px;padding:8px;margin-bottom:6px;';
  row.innerHTML=`
    <input type="text" class="input dedu-label" placeholder="項目名 (例: リース代)" value="${escHtml(item?.label||'')}" style="width:100%;font-size:13px;padding:6px 8px;margin-bottom:6px;box-sizing:border-box;">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <div style="display:flex;align-items:center;gap:4px;flex:1;min-width:140px;">
        <span style="font-size:13px;color:var(--text-sub);">¥</span>
        <input type="number" class="input dedu-amount" placeholder="0" value="${item?.amount??''}" min="0" step="100" style="flex:1;min-width:80px;font-size:13px;padding:6px 8px;text-align:right;">
      </div>
      <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;white-space:nowrap;color:var(--text-sub);">
        <input type="checkbox" class="dedu-active" ${(item?.active!==false)?'checked':''}>有効
      </label>
      <button type="button" class="btn-ghost" onclick="this.closest('.dedu-row').remove()" style="padding:4px 10px;font-size:12px;color:var(--danger);border-color:#fecaca;">🗑 削除</button>
    </div>
  `;
  $('mem-edit-deductions').appendChild(row);
};

  $('member-edit-modal').style.display='none';
};

async function autoFillSites(){
  if(!confirm('各ツール (新聞/アスクル/デリバリー) のデータから配属現場を自動補完します。\n\n対象: 配属現場が空欄のメンバーのみ (既設定者はスキップ)。\n\n続行しますか?'))return;

  // 1. 3 つの RPC を並列に呼んで phone → site のマップを構築
  // - NexPort: closed_pay_statements から営業所
  // - askul: profiles + offices.name
  // - delivery: profiles + clients.short_name (集約)
  const askulRpc=async()=>{
    const r=await fetch('https://erfcsnzdooswgpvgrapb.supabase.co/rest/v1/rpc/get_driver_site_map',{
      method:'POST',headers:{'Content-Type':'application/json','apikey':ASKUL_ANON,'Authorization':'Bearer '+ASKUL_ANON},body:'{}',
    });
    if(!r.ok)return [];
    return await r.json();
  };
  const deliveryRpc=async()=>{
    const r=await fetch('https://ymdaakiwxkjotlmzveom.supabase.co/rest/v1/rpc/get_driver_site_map',{
      method:'POST',headers:{'Content-Type':'application/json','apikey':DELIVERY_ANON,'Authorization':'Bearer '+DELIVERY_ANON},body:'{}',
    });
    if(!r.ok)return [];
    return await r.json();
  };
  const nexportRpc=async()=>{
    const {data}=await sb.rpc('get_shift_area_map');
    return data||[];
  };

  const btn=event?.target;
  if(btn){btn.disabled=true;btn.textContent='取得中...';}

  let shiftRows=[],askulRows=[],deliveryRows=[];
  try{
    [shiftRows,askulRows,deliveryRows]=await Promise.all([nexportRpc(),askulRpc(),deliveryRpc()]);
  }catch(e){
    alert('取得失敗: '+e.message);
    if(btn){btn.disabled=false;btn.textContent='📥 ツールから自動補完';}
    return;
  }

  // phone → site の各マップ (normalize 済み phone をキーに)
  const shiftMap={},askulMap={},deliveryMap={};
  shiftRows.forEach(r=>{const np=normalizePhone(r.phone);if(np&&r.area)shiftMap[np]=r.area;});
  askulRows.forEach(r=>{const np=normalizePhone(r.phone);if(np&&r.site)askulMap[np]=r.site;});
  deliveryRows.forEach(r=>{const np=normalizePhone(r.phone);if(np&&r.site)deliveryMap[np]=r.site;});

  // 各メンバーで合成
  const updates=[];
  let noChange=0,skipped=0;
  for(const m of allMembers){
    if(m.site){skipped++;continue;}// 既設定はスキップ
    if(!m.phone)continue;
    const np=normalizePhone(m.phone);
    const parts=[];
    if(shiftMap[np])parts.push('🗞'+shiftMap[np]);
    if(askulMap[np])parts.push('📦'+askulMap[np]);
    if(deliveryMap[np])parts.push('🚚'+deliveryMap[np]);
    if(parts.length===0){noChange++;continue;}
    updates.push({id:m.id,newSite:parts.join(' / ')});
  }

  if(updates.length===0){
    if(btn){btn.disabled=false;btn.textContent='📥 ツールから自動補完';}
    alert(`更新対象なし\n既設定: ${skipped}名\n3ツールいずれにもデータ無し: ${noChange}名`);
    return;
  }

  // プレビュー: 何件更新するか確認
  const sample=updates.slice(0,5).map(u=>{
    const m=allMembers.find(x=>x.id===u.id);
    return `・${m?.display_name||'(無名)'} → ${u.newSite}`;
  }).join('\n');
  const more=updates.length>5?`\n...他 ${updates.length-5}名`:'';
  if(!confirm(`${updates.length}名 を自動補完します:\n\n${sample}${more}\n\nスキップ: 既設定 ${skipped}名 / データ無し ${noChange}名\n\n更新を実行しますか?`)){
    if(btn){btn.disabled=false;btn.textContent='📥 ツールから自動補完';}
    return;
  }

  // バッチ更新 (10件ずつ並列)
  if(btn){btn.textContent='更新中... (0/'+updates.length+')';}
  let done=0,errors=0;
  for(let i=0;i<updates.length;i+=10){
    const batch=updates.slice(i,i+10);
    await Promise.all(batch.map(async u=>{
      const {error}=await sb.from('profiles').update({site:u.newSite}).eq('id',u.id);
      if(error){errors++;console.error('update failed for',u.id,error);}
      else{
        const m=allMembers.find(x=>x.id===u.id);
        if(m)m.site=u.newSite;
      }
      done++;
    }));
    if(btn)btn.textContent=`更新中... (${done}/${updates.length})`;
  }

  if(btn){btn.disabled=false;btn.textContent='📥 ツールから自動補完';}
  renderMemberList();
  alert(`✓ 自動補完完了\n更新成功: ${done-errors}名${errors>0?`\n失敗: ${errors}名 (コンソール参照)`:''}\nスキップ (既設定): ${skipped}名\nデータ無し: ${noChange}名`);
}

window.saveMemberEdit=async function(){
  const btn=$('mem-edit-save-btn');
  const id=btn.dataset.id;
  if(!id)return;
  const err=$('mem-edit-err');
  err.style.display='none';
  const phone=normalizePhone($('mem-edit-phone').value);
  if($('mem-edit-phone').value.trim()&&phone.length<10){
    err.textContent='電話番号は10桁以上で入力してください (空欄も可)';err.style.display='block';return;
  }
  const updates={
    display_name:$('mem-edit-name').value.trim()||null,
    phone:phone||null,
    company:$('mem-edit-company').value.trim()||null,
    position:$('mem-edit-position').value.trim()||null,
    site:$('mem-edit-site').value.trim()||null,
    is_company_owner:$('mem-edit-owner').checked,
  };
  btn.disabled=true;btn.textContent='保存中...';
  const {error}=await sb.from('profiles').update(updates).eq('id',id);
  if(error){btn.disabled=false;btn.textContent='保存';err.textContent='保存失敗: '+error.message;err.style.display='block';return;}

  // 差引項目を保存: 既存全削除 + 新規一括 insert (シンプル化)
  const rows=Array.from(document.querySelectorAll('#mem-edit-deductions .dedu-row'));
  const items=rows.map((row,idx)=>{
    const label=row.querySelector('.dedu-label').value.trim();
    const amount=parseInt(row.querySelector('.dedu-amount').value,10);
    const active=row.querySelector('.dedu-active').checked;
    if(!label||isNaN(amount)||amount<0)return null;
    return {profile_id:id,label,amount,active,sort_order:idx};
  }).filter(Boolean);

  const {error:delErr}=await sb.from('member_deductions').delete().eq('profile_id',id);
  if(delErr){btn.disabled=false;btn.textContent='保存';err.textContent='差引項目削除失敗: '+delErr.message;err.style.display='block';return;}
  if(items.length>0){
    const {error:insErr}=await sb.from('member_deductions').insert(items);
    if(insErr){btn.disabled=false;btn.textContent='保存';err.textContent='差引項目保存失敗: '+insErr.message;err.style.display='block';return;}
  }

  btn.disabled=false;btn.textContent='保存';
  // ローカルキャッシュ更新 + 再描画
  const m=allMembers.find(x=>x.id===id);
  if(m)Object.assign(m,updates);
  closeMemberEdit();
  renderMemberList();
};
