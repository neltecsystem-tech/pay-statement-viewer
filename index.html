async function autoFillSites(){
  if(!confirm('各ツール (新聞/アスクル/デリバリー) のデータから配属現場を自動補完します。\n\n突合: 電話番号で照合。電話が無くても一意な氏名なら名前で補完(同姓同名は電話のみ)。\n対象: 配属現場が空欄のメンバーのみ (既設定者はスキップ)。\n\n続行しますか?'))return;

  // 3 ツールの RPC を並列取得 (各行: name, phone, area/site)
  const toolRpc=async(base,anon)=>{
    try{const r=await fetch(base+'/rest/v1/rpc/get_driver_site_map',{method:'POST',headers:{'Content-Type':'application/json','apikey':anon,'Authorization':'Bearer '+anon},body:'{}'});if(!r.ok)return [];return await r.json();}catch(_){return [];}
  };

  const btn=event?.target;
  if(btn){btn.disabled=true;btn.textContent='取得中...';}

  let shiftRows=[],askulRows=[],deliveryRows=[];
  try{
    [shiftRows,askulRows,deliveryRows]=await Promise.all([
      sb.rpc('get_shift_area_map').then(({data})=>data||[]),
      toolRpc('https://erfcsnzdooswgpvgrapb.supabase.co',ASKUL_ANON),
      toolRpc('https://ymdaakiwxkjotlmzveom.supabase.co',DELIVERY_ANON),
    ]);
  }catch(e){
    alert('取得失敗: '+e.message);
    if(btn){btn.disabled=false;btn.textContent='📥 ツールから自動補完';}
    return;
  }

  // 電話/一意氏名の両マップを構築 (同姓同名で値が割れる氏名は除外)
  const sMaps=buildToolMaps(shiftRows,'area'), aMaps=buildToolMaps(askulRows,'site'), dMaps=buildToolMaps(deliveryRows,'site');
  const dup=workDupNames();

  // 各メンバーで合成 (電話優先・同姓同名は名前一致しない)
  const updates=[];
  let noChange=0,skipped=0;
  for(const m of allMembers){
    if(m.site){skipped++;continue;}// 既設定はスキップ
    const parts=[];
    const s=matchTool(m,sMaps,dup); if(s)parts.push('🗞'+s);
    const a=matchTool(m,aMaps,dup); if(a)parts.push('📦'+a);
    const d=matchTool(m,dMaps,dup); if(d)parts.push('🚚'+d);
    if(parts.length===0){noChange++;continue;}
    updates.push({id:m.id,newSite:parts.join(' / ')});
  }

  if(updates.length===0){
    if(btn){btn.disabled=false;btn.textContent='📥 ツールから自動補完';}
    alert(`更新対象なし\n既設定: ${skipped}名\n3ツールいずれにもデータ無し: ${noChange}名`);
    return;
  }

  // プレビュー: 何件更新するか確認
  const sample=updates.slice(0,5).map(u=>{
    const m=allMembers.find(x=>x.id===u.id);
    return `・${m?.display_name||'(無名)'} → ${u.newSite}`;
  }).join('\n');
  const more=updates.length>5?`\n...他 ${updates.length-5}名`:'';
  if(!confirm(`${updates.length}名 を自動補完します:\n\n${sample}${more}\n\nスキップ: 既設定 ${skipped}名 / データ無し ${noChange}名\n\n更新を実行しますか?`)){
    if(btn){btn.disabled=false;btn.textContent='📥 ツールから自動補完';}
    return;
  }

  // バッチ更新 (10件ずつ並列)
  if(btn){btn.textContent='更新中... (0/'+updates.length+')';}
  let done=0,errors=0;
  for(let i=0;i<updates.length;i+=10){
    const batch=updates.slice(i,i+10);
    await Promise.all(batch.map(async u=>{
      const {data,error}=await sb.from('profiles').update({site:u.newSite}).eq('id',u.id).select('id');
      if(error||!data||!data.length){errors++;console.error('update failed/blocked for',u.id,error);}
      else{
        const m=allMembers.find(x=>x.id===u.id);
        if(m)m.site=u.newSite;
      }
      done++;
    }));
    if(btn)btn.textContent=`更新中... (${done}/${updates.length})`;
  }

  if(btn){btn.disabled=false;btn.textContent='📥 ツールから自動補完';}
  renderMemberList();
  alert(`✓ 自動補完完了\n更新成功: ${done-errors}名${errors>0?`\n失敗: ${errors}名 (コンソール参照)`:''}\nスキップ (既設定): ${skipped}名\nデータ無し: ${noChange}名`);
}

// 各ツール(アスクル/デリバリー)の所属法人から profiles.company を自動補完。
// 氏名 or 電話で突合。会社名が入れば、会計マスタのT番号が明細に自動反映される (resolveInvoiceNo)。
async function autoFillCompanies(){
  if(!confirm('各ツール(アスクル/デリバリー)の所属法人から「会社名」を自動補完します。\n\n対象: 会社名が空欄のメンバーのみ(既設定はスキップ)。\n氏名または電話で突合します。\n\n続行しますか?'))return;
  const btn=event?.target;
  if(btn){btn.disabled=true;btn.textContent='取得中...';}
  const rpc=async(base,anon)=>{
    try{
      const r=await fetch(base+'/rest/v1/rpc/get_driver_company_map',{method:'POST',headers:{'Content-Type':'application/json','apikey':anon,'Authorization':'Bearer '+anon},body:'{}'});
      if(!r.ok)return [];return await r.json();
    }catch(_){return [];}
  };
  let rows=[];
  try{
    const [a,d]=await Promise.all([
      rpc('https://erfcsnzdooswgpvgrapb.supabase.co',ASKUL_ANON),
      rpc('https://ymdaakiwxkjotlmzveom.supabase.co',DELIVERY_ANON),
    ]);
    rows=[...(a||[]),...(d||[])];
  }catch(e){alert('取得失敗: '+e.message);if(btn){btn.disabled=false;btn.textContent='🏢 会社名を自動補完';}return;}
  // RPCは name(full_name)/phone/company_name を返す → buildToolMaps で電話/一意氏名マップに
  const maps=buildToolMaps(rows.map(r=>({name:r.full_name,phone:r.phone,company_name:r.company_name})),'company_name');
  const dup=workDupNames();
  const updates=[];let skipped=0,noData=0;
  for(const m of allMembers){
    if(m.company){skipped++;continue;}
    const co=matchTool(m,maps,dup);// 電話優先・同姓同名は名前一致しない
    if(!co){noData++;continue;}
    updates.push({id:m.id,company:co});
  }
  if(!updates.length){if(btn){btn.disabled=false;btn.textContent='🏢 会社名を自動補完';}alert(`更新対象なし\n既設定: ${skipped}名 / ツールに所属法人なし(氏名・電話 不一致): ${noData}名`);return;}
  const sample=updates.slice(0,8).map(u=>{const m=allMembers.find(x=>x.id===u.id);return `・${m?.display_name||'(無名)'} → ${u.company}`;}).join('\n');
  const more=updates.length>8?`\n...他 ${updates.length-8}名`:'';
  if(!confirm(`${updates.length}名 に会社名を設定します:\n\n${sample}${more}\n\n設定後、会計マスタにT番号があれば明細に自動表示されます。\n実行しますか?`)){if(btn){btn.disabled=false;btn.textContent='🏢 会社名を自動補完';}return;}
  if(btn)btn.textContent='更新中... (0/'+updates.length+')';
  let done=0,errors=0;
  for(let i=0;i<updates.length;i+=10){
    const batch=updates.slice(i,i+10);
    await Promise.all(batch.map(async u=>{
      const {data,error}=await sb.from('profiles').update({company:u.company}).eq('id',u.id).select('id');
      if(error||!data||!data.length){errors++;console.error('company update failed/blocked',u.id,error);}
      else{const m=allMembers.find(x=>x.id===u.id);if(m)m.company=u.company;}
      done++;
    }));
    if(btn)btn.textContent=`更新中... (${done}/${updates.length})`;
  }
  if(btn){btn.disabled=false;btn.textContent='🏢 会社名を自動補完';}
  renderMemberList();
  alert(`✓ 会社名の自動補完完了\n更新成功: ${done-errors}名${errors?`\n失敗: ${errors}名 (コンソール参照)`:''}\nスキップ(既設定): ${skipped}名\n不一致: ${noData}名`);
}

window.saveMemberEdit=async function(){
  const btn=$('mem-edit-save-btn');
  const id=btn.dataset.id;
  if(!id)return;
  const err=$('mem-edit-err');
  err.style.display='none';
  const phone=normalizePhone($('mem-edit-phone').value);
  if($('mem-edit-phone').value.trim()&&phone.length<10){
    err.textContent='電話番号は10桁以上で入力してください (空欄も可)';err.style.display='block';return;
  }
  const invoiceNo=normInvoiceNo($('mem-edit-invoice').value);
  if(!isValidInvoiceNo(invoiceNo)){
    err.textContent='インボイス登録番号は「T + 13桁の数字」で入力してください (例: T1234567890123 / 空欄も可)';err.style.display='block';return;
  }
  const updates={
    display_name:$('mem-edit-name').value.trim()||null,
    phone:phone||null,
    company:$('mem-edit-company').value.trim()||null,
    position:$('mem-edit-position').value.trim()||null,
    invoice_number:invoiceNo||null,
    site:$('mem-edit-site').value.trim()||null,
    is_company_owner:$('mem-edit-owner').checked,
  };
  btn.disabled=true;btn.textContent='保存中...';
  const {data:upd,error}=await sb.from('profiles').update(updates).eq('id',id).select('id');
  if(error){btn.disabled=false;btn.textContent='保存';err.textContent='保存失敗: '+error.message;err.style.display='block';return;}
  if(!upd||!upd.length){btn.disabled=false;btn.textContent='保存';err.textContent='保存できませんでした（権限不足の可能性）。管理者権限を確認してください。';err.style.display='block';return;}

  // 差引項目を保存: 既存全削除 + 新規一括 insert (シンプル化)
  const rows=Array.from(document.querySelectorAll('#mem-edit-deductions .dedu-row'));
  const items=rows.map((row,idx)=>{
    const label=row.querySelector('.dedu-label').value.trim();
    const amount=parseInt(row.querySelector('.dedu-amount').value,10);
    const active=row.querySelector('.dedu-active').checked;
    if(!label||isNaN(amount)||amount<0)return null;
    return {profile_id:id,label,amount,active,sort_order:idx};
  }).filter(Boolean);

  const {error:delErr}=await sb.from('member_deductions').delete().eq('profile_id',id);
  if(delErr){btn.disabled=false;btn.textContent='保存';err.textContent='差引項目削除失敗: '+delErr.message;err.style.display='block';return;}
  if(items.length>0){
    const {error:insErr}=await sb.from('member_deductions').insert(items);
    if(insErr){btn.disabled=false;btn.textContent='保存';err.textContent='差引項目保存失敗: '+insErr.message;err.style.display='block';return;}
  }

  btn.disabled=false;btn.textContent='保存';
  // ローカルキャッシュ更新 + 再描画
  const m=allMembers.find(x=>x.id===id);
  if(m)Object.assign(m,updates);
  closeMemberEdit();
  renderMemberList();
};
