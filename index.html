<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>統合支払明細ビューア</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E📑%3C/text%3E%3C/svg%3E">
<style>
:root{
  --primary:#4f46e5;--primary-d:#4338ca;--bg:#f8fafc;--card:#ffffff;
  --border:#e2e8f0;--text:#0f172a;--text-sub:#64748b;--danger:#dc2626;
  --success:#16a34a;--warning:#f59e0b;
  --shift:#0ea5e9;--askul:#f97316;--delivery:#10b981;
}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Yu Gothic UI',sans-serif;background:var(--bg);color:var(--text);font-size:14px;line-height:1.5;}
.container{max-width:900px;margin:0 auto;padding:16px;}
header{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-d) 100%);color:#fff;padding:18px 20px;border-radius:12px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;}
header h1{margin:0;font-size:18px;font-weight:700;}
header .sub{font-size:12px;opacity:.85;margin-top:2px;}
.btn{background:var(--primary);color:#fff;border:none;padding:8px 14px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;}
.btn:hover{background:var(--primary-d);}
.btn-secondary{background:#fff;color:var(--primary);border:1px solid #fff;}
.btn-secondary:hover{background:#eef2ff;}
.btn-danger{background:var(--danger);color:#fff;border:none;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;}
.btn-ghost{background:transparent;color:var(--text-sub);border:1px solid var(--border);padding:6px 10px;border-radius:6px;cursor:pointer;font-size:12px;}
.input{padding:8px 10px;border:1px solid var(--border);border-radius:6px;font-size:14px;background:#fff;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px;}
.card-header{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600;color:#fff;}
.badge-shift{background:var(--shift);}
.badge-askul{background:var(--askul);}
.badge-delivery{background:var(--delivery);}
.status-pill{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:600;}
.status-final{background:#dcfce7;color:#166534;}
.status-draft{background:#fef3c7;color:#92400e;}
.status-none{background:#f1f5f9;color:#64748b;}
.amount-big{font-size:24px;font-weight:700;color:var(--text);}
.amount-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px;}
.amount-row .label{color:var(--text-sub);}
.amount-row .value{font-weight:600;}
.divider{height:1px;background:var(--border);margin:8px 0;}
table.detail{width:100%;border-collapse:collapse;font-size:12px;margin-top:8px;}
table.detail th{background:#f1f5f9;padding:5px;border:1px solid #cbd5e1;text-align:center;}
table.detail td{padding:4px 6px;border:1px solid #e2e8f0;}
table.detail tr.sun{background:#fee2e2;}
table.detail tr.sat{background:#fef3c7;}
.center{text-align:center;}
.right{text-align:right;}
.muted{color:var(--text-sub);font-size:12px;}
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px;}
.login-screen{max-width:380px;margin:60px auto;padding:32px;background:#fff;border-radius:16px;box-shadow:0 10px 40px rgba(0,0,0,.08);}
.login-screen h2{margin:0 0 18px;text-align:center;font-size:20px;color:var(--primary);}
.login-screen .field{margin-bottom:12px;}
.login-screen label{display:block;font-size:12px;color:var(--text-sub);margin-bottom:4px;}
.login-screen input{width:100%;padding:10px;border:1px solid var(--border);border-radius:8px;font-size:14px;}
.login-screen .err{color:var(--danger);font-size:13px;margin-bottom:10px;display:none;}
.login-screen .btn-block{width:100%;padding:12px;font-size:15px;}
.detail-toggle{background:none;border:none;color:var(--primary);cursor:pointer;font-size:12px;padding:0;margin-top:6px;}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #c7d2fe;border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty{text-align:center;color:var(--text-sub);padding:24px;font-size:13px;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;display:flex;justify-content:center;align-items:center;padding:20px;}
.modal{background:#fff;border-radius:14px;padding:28px;max-width:380px;width:100%;}
.modal h3{margin:0 0 8px;font-size:18px;}
.modal p{margin:0 0 16px;font-size:13px;color:var(--text-sub);}
.summary-row{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px;}
.summary-label{font-size:13px;color:var(--text-sub);}
.summary-value{font-size:14px;font-weight:600;}
.grand-total-card{background:linear-gradient(135deg,#fef3c7,#fde68a);border:2px solid var(--warning);border-radius:12px;padding:16px;margin-bottom:16px;text-align:center;}
.grand-total-card .label{font-size:12px;color:#92400e;font-weight:600;}
.grand-total-card .value{font-size:30px;font-weight:700;color:#92400e;margin-top:4px;}
@media(max-width:600px){
  .container{padding:10px;}
  header{padding:14px;}
  header h1{font-size:16px;}
  .amount-big{font-size:20px;}
  .grand-total-card .value{font-size:24px;}
}
</style>
</head>
<body>

<div id="app">
  <div class="container">
    <div id="screen-login" class="login-screen">
      <h2>📑 統合支払明細ビューア</h2>
      <div class="field">
        <label>メールアドレス</label>
        <input type="email" id="login-email" autocomplete="email" placeholder="example@neltec.jp">
      </div>
      <div class="field">
        <label>パスワード</label>
        <input type="password" id="login-pw" autocomplete="current-password" placeholder="NexPort と同じパスワード">
      </div>
      <div class="err" id="login-err"></div>
      <button class="btn btn-block" onclick="doLogin()">ログイン</button>
      <p class="muted" style="margin-top:14px;text-align:center;font-size:11px;">
        NexPort と同じメール・パスワードでログインしてください。<br>
        アカウントが無い方は管理者にお問い合わせください。
      </p>
    </div>

    <div id="screen-main" style="display:none;">
      <header>
        <div>
          <h1>📑 統合支払明細ビューア</h1>
          <div class="sub" id="hdr-user">読み込み中...</div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="btn btn-secondary" id="btn-open-admin" onclick="openAdminScreen()" title="メンバー管理" style="display:none;">👥 メンバー管理</button>
          <button class="btn btn-secondary" id="btn-contact-mgr" onclick="openContactMgr()" title="自社の担当者(ビューアにログインできる人)を管理" style="display:none;background:#0891b2;color:#fff;">🏢 自社の担当者</button>
          <button class="btn btn-secondary" id="btn-central-master" onclick="openCentralMaster()" title="人材マスタ: 区分/会社/電話/インボイスを1画面で管理" style="display:none;background:#7c3aed;color:#fff;">🗂 人材マスタ</button>
          <button class="btn btn-secondary" onclick="changePhone()" title="登録電話番号を変更">📱 電話変更</button>
          <button class="btn btn-secondary" onclick="editMyInvoice()" title="自分の適格請求書 登録番号(T+13桁)を登録/変更">🧾 ｲﾝﾎﾞｲｽ番号</button>
          <button class="btn btn-secondary" onclick="doLogout()">ログアウト</button>
        </div>
      </header>

      <div class="toolbar">
        <label>対象月:</label>
        <input type="month" id="ym-input" class="input">
        <button class="btn" onclick="loadAll()">読み込み</button>
        <button class="btn btn-pdf" id="btn-summary-pdf" onclick="downloadSummaryPdf()" disabled style="background:#0ea5e9;">📄 サマリーPDF</button>
        <button class="btn-ghost" id="btn-all-pdf" onclick="downloadAllPdf()" disabled>📦 全部一括PDF</button>
        <span id="admin-toggle-wrap" style="display:none;margin-left:auto;">
          <label style="display:flex;align-items:center;gap:6px;cursor:pointer;">
            <input type="checkbox" id="admin-mode-cb" onchange="toggleAdminMode()"> 管理者: 任意電話検索
          </label>
        </span>
      </div>

      <div id="admin-phone-bar" style="display:none;margin-bottom:14px;">
        <div class="card" style="background:#fef3c7;border-color:#f59e0b;">
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:6px;">
            <span style="font-weight:600;font-size:13px;">🔍 他人の明細検索:</span>
            <input type="text" id="admin-name-input" class="input" placeholder="名前で検索 (例: 小林)" style="flex:1;min-width:160px;" autocomplete="off" oninput="onNameInput()" onkeydown="if(event.key==='Enter')adminSearch()">
            <span style="font-size:12px;color:#92400e;">または</span>
            <input type="tel" id="admin-phone-input" class="input" placeholder="電話番号 (例 090-1234-5678)" style="flex:1;min-width:180px;">
            <button class="btn" onclick="adminSearch()">検索</button>
            <button class="btn" style="background:#6366f1;" onclick="loadAllPayees()" title="対象月の全取引先(個人=氏名/法人・屋号=会社名)を3ツール横断で一覧集計">📋 取引先一覧（当月）</button>
          </div>
          <div id="admin-name-results" style="display:none;margin-top:6px;background:#fff;border-radius:6px;border:1px solid var(--border);max-height:240px;overflow-y:auto;"></div>
        </div>
      </div>

      <div id="result-area"></div>
    </div>

    <!-- 管理者: メンバー管理画面 -->
    <div id="screen-admin" style="display:none;">
      <header>
        <div>
          <h1>👥 メンバー管理</h1>
          <div class="sub" id="hdr-admin-user">読み込み中...</div>
        </div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;">
          <button class="btn btn-secondary" onclick="closeAdminScreen()">← 明細ビューアに戻る</button>
          <button class="btn btn-secondary" onclick="doLogout()">ログアウト</button>
        </div>
      </header>

      <div class="card" style="margin-bottom:12px;">
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:10px;">
          <input type="text" id="admin-mbr-search" class="input" placeholder="名前/電話/会社で検索" style="flex:1;min-width:200px;">
          <select id="admin-mbr-filter" class="input" onchange="renderMemberList()">
            <option value="all">すべて</option>
            <option value="admins">管理者のみ</option>
            <option value="members">一般メンバーのみ</option>
            <option value="owners">法人オーナーのみ</option>
            <option value="no_phone">電話未登録のみ</option>
            <option value="no_site">現場未設定のみ</option>
            <option value="hidden">🔒 金額非表示のみ</option>
          </select>
          <select id="admin-mbr-groupby" class="input" onchange="renderMemberList()" title="表示モード">
            <option value="none">個人一覧</option>
            <option value="company">会社別グループ</option>
          </select>
          <button class="btn" onclick="loadMembers()">🔄 再読み込み</button>
          <button class="btn" onclick="autoFillSites()" title="各ツール (新聞/アスクル/デリバリー) のデータから配属現場を自動補完" style="background:#10b981;">📥 ツールから自動補完</button>
          <button class="btn" onclick="autoFillCompanies()" title="各ツール(アスクル/デリバリー)の所属法人から会社名を自動補完。会計マスタにT番号があれば明細に自動反映" style="background:#6366f1;">🏢 会社名を自動補完</button>
        </div>
        <div style="font-size:12px;color:var(--text-sub);">
          <span id="admin-mbr-count">読み込み中...</span>
        </div>
      </div>

      <div id="admin-mbr-list-area"></div>
    </div>
  </div>
</div>

<!-- メンバー編集モーダル (管理者画面用) -->
<div id="member-edit-modal" style="display:none;" class="modal-overlay">
  <div class="modal" style="max-width:480px;">
    <h3 id="mem-edit-title">メンバー編集</h3>
    <div style="margin-bottom:10px;">
      <label style="display:block;font-size:12px;color:var(--text-sub);margin-bottom:4px;">表示名</label>
      <input type="text" id="mem-edit-name" class="input" style="width:100%;">
    </div>
    <div style="margin-bottom:10px;">
      <label style="display:block;font-size:12px;color:var(--text-sub);margin-bottom:4px;">電話番号</label>
      <input type="tel" id="mem-edit-phone" class="input" style="width:100%;" placeholder="例 090-1234-5678">
    </div>
    <div style="margin-bottom:10px;">
      <label style="display:block;font-size:12px;color:var(--text-sub);margin-bottom:4px;">会社</label>
      <input type="text" id="mem-edit-company" class="input" style="width:100%;" placeholder="例: 株式会社○○ など" list="company-suggestions" oninput="memUpdateInvoiceHint()">
      <datalist id="company-suggestions"></datalist>
    </div>
    <div style="margin-bottom:10px;">
      <label style="display:block;font-size:12px;color:var(--text-sub);margin-bottom:4px;">役職</label>
      <input type="text" id="mem-edit-position" class="input" style="width:100%;">
    </div>
    <div style="margin-bottom:10px;">
      <label style="display:block;font-size:12px;color:var(--text-sub);margin-bottom:4px;">🧾 インボイス登録番号 (T+13桁)</label>
      <input type="text" id="mem-edit-invoice" class="input" style="width:100%;" placeholder="空欄なら会社名から会計マスタを自動参照" oninput="memUpdateInvoiceHint()">
      <div id="mem-edit-invoice-auto" style="display:none;font-size:11px;margin-top:4px;padding:6px 8px;background:#ecfeff;border:1px solid #a5f3fc;border-radius:6px;color:#155e75;"></div>
    </div>
    <div style="margin-bottom:10px;">
      <label style="display:block;font-size:12px;color:var(--text-sub);margin-bottom:4px;">📍 配属現場</label>
      <input type="text" id="mem-edit-site" class="input" style="width:100%;" placeholder="例: 立川 / ヤマト / アスクル など" list="site-suggestions">
      <datalist id="site-suggestions"></datalist>
    </div>
    <div style="margin-bottom:14px;">
      <label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;">
        <input type="checkbox" id="mem-edit-owner">
        <span>👑 法人オーナー (このフラグ ON で、 法人ドライバーでも自分の金額を見られる)</span>
      </label>
    </div>

    <!-- 差引項目 (毎月適用される控除) -->
    <div style="margin-bottom:14px;padding:12px;background:#fef9c3;border-radius:8px;border:1px solid #fde047;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
        <span style="font-size:13px;font-weight:600;color:#854d0e;">💸 差引項目 (毎月自動で引かれる金額)</span>
        <button type="button" class="btn-ghost" onclick="addDeductionRow()" style="font-size:11px;padding:3px 8px;">+ 追加</button>
      </div>
      <div id="mem-edit-deductions"></div>
      <div style="font-size:11px;color:#92400e;margin-top:6px;">例: リース代 39000、 制服代 5000 など。 合計支払額から自動で差し引かれます。</div>
    </div>

    <div id="mem-edit-err" style="color:var(--danger);font-size:12px;margin-bottom:10px;display:none;"></div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn-ghost" onclick="closeMemberEdit()">キャンセル</button>
      <button class="btn" id="mem-edit-save-btn" onclick="saveMemberEdit()">保存</button>
    </div>
  </div>
</div>

<!-- PDF生成用 オフスクリーン領域 -->
<div id="pdf-stage" aria-hidden="true" style="position:absolute;left:-99999px;top:0;width:760px;background:#fff;font-family:'Yu Gothic UI','Hiragino Sans',sans-serif;color:#0f172a;"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
'use strict';

const SUPABASE_URL='https://nccognptoprhwsbjnwcu.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jY29nbnB0b3ByaHdzYmpud2N1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQzNDU0NDEsImV4cCI6MjA4OTkyMTQ0MX0.M3h31uPyKYWlNevVW3OvZOonoTidC1KLZ04sB5nRKzU';
const ASKUL_URL='https://erfcsnzdooswgpvgrapb.supabase.co/functions/v1/pay-statement-by-phone';
const ASKUL_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVyZmNzbnpkb29zd2dwdmdyYXBiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY4NDE3MDYsImV4cCI6MjA5MjQxNzcwNn0.TdP1S8kReDi-ZY0xtL5e8cZc_WsVMLSukY1zSQHNmCQ';
const DELIVERY_URL='https://ymdaakiwxkjotlmzveom.supabase.co/functions/v1/pay-statement-by-phone';
const DELIVERY_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InltZGFha2l3eGtqb3RsbXp2ZW9tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg1Njk4MjMsImV4cCI6MjA5NDE0NTgyM30.7T-1IjHuaxORPC31FQ7U6U7o-00_cJzUJIywQqxgrZ8';
const SHIFT_URL=SUPABASE_URL+'/functions/v1/pay-statement-by-phone';

const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON);

let session=null;
// EF 呼び出し直前に最新アクセストークンを取得 (期限切れなら自動更新)。長時間タブ放置でも 401 を防ぐ。
async function freshToken(){
  try{
    let {data}=await sb.auth.getSession();
    let s=data&&data.session;
    // 期限切れ間近/切れていれば明示的にリフレッシュ
    if(s&&s.expires_at&&s.expires_at*1000<Date.now()+30000){
      const r=await sb.auth.refreshSession();
      if(r&&r.data&&r.data.session)s=r.data.session;
    }
    if(s){session=s;return s.access_token||'';}
  }catch(e){}
  return (session&&session.access_token)||'';
}
let profile=null;// ログイン中のユーザー
let targetProfile=null;// 現在表示中のドライバー (自分 or 検索した他人)
let currentData=null;// {shift, askul, delivery, ym, phone}

function $(id){return document.getElementById(id);}

function normalizePhone(s){
  if(!s)return '';
  return String(s).replace(/[０-９]/g,ch=>String.fromCharCode(ch.charCodeAt(0)-0xff10+0x30)).replace(/[^\d]/g,'');
}

// 適格請求書 登録番号 (T+13桁)。全角→半角・T以外/数字以外を除去
function normInvoiceNo(s){
  if(!s)return '';
  return String(s).replace(/[０-９Ｔ]/g,ch=>String.fromCharCode(ch.charCodeAt(0)-0xfee0)).toUpperCase().replace(/[^0-9T]/g,'');
}
function isValidInvoiceNo(t){return t===''||/^T\d{13}$/.test(t);}

// 会計ツール「適格請求書マスタ(取引先)」のキャッシュ。会社名でT番号を引く
let invPartners=[];// [{name, invoice_number, registered, effective_from}]
// 会社名/取引先名の表記ゆれ吸収 (株式会社・合同会社・記号・空白を除去)
function normCo(s){
  return String(s||'')
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0))
    .replace(/株式会社|有限会社|合同会社|（株）|（有）|（合）|㈱|㈲/g,'')
    .replace(/[\s　・,，.。\-—–ー'"`]/g,'').toLowerCase();
}
// 氏名キー (空白除去)
const nmKey=s=>String(s||'').replace(/[\s　]/g,'').trim();
// ツール行 [{name, phone, <valKey>}] → {phoneMap, nameMap}。同名で値が割れる氏名は曖昧として nameMap から除外
function buildToolMaps(rows,valKey){
  const phoneMap={},nv={};
  (rows||[]).forEach(r=>{const v=(r[valKey]||'').trim();if(!v)return;const p=normalizePhone(r.phone);if(p)phoneMap[p]=v;const n=nmKey(r.name);if(n)(nv[n]=nv[n]||new Set()).add(v);});
  const nameMap={};
  for(const n in nv)if(nv[n].size===1)nameMap[n]=[...nv[n]][0];
  return {phoneMap,nameMap};
}
// workchat 内で重複する氏名 (同姓同名) の集合
function workDupNames(){
  const c={};(allMembers||[]).forEach(m=>{const n=nmKey(m.display_name);if(n)c[n]=(c[n]||0)+1;});
  return new Set(Object.keys(c).filter(k=>c[k]>1));
}
// member を tool maps で解決。電話優先。同姓同名(dup)は名前一致を使わず電話必須
function matchTool(m,maps,dup){
  const p=normalizePhone(m.phone);
  if(p&&maps.phoneMap[p])return maps.phoneMap[p];
  const n=nmKey(m.display_name);
  if(n&&!dup.has(n)&&maps.nameMap[n])return maps.nameMap[n];
  return null;
}

// 対象者のインボイス番号を解決: 手入力(profiles.invoice_number)優先 → 無ければ会社名で会計マスタ照合
function resolveInvoiceNo(prof,ym){
  if(!prof)return null;
  if(prof.invoice_number)return {no:prof.invoice_number,src:'手入力'};
  const okMonth=p=>(!p.effective_from || String(p.effective_from).slice(0,7)<=(ym||'9999-99'));
  // ① 会社名で会計マスタ(取引先)を照合 (法人ドライバー)
  const co=normCo(prof.company);
  if(co){const hit=invPartners.find(p=>normCo(p.name)===co && okMonth(p));if(hit)return {no:hit.invoice_number,src:'会計マスタ(会社名)'};}
  // ② 本人の氏名で照合 (個人事業主が取引先として適格登録されている場合)
  const nm=normCo(prof.display_name);
  if(nm){const hit=invPartners.find(p=>normCo(p.name)===nm && okMonth(p));if(hit)return {no:hit.invoice_number,src:'会計マスタ(氏名)'};}
  return null;
}

// 本人が自分のインボイス登録番号を登録/変更
window.editMyInvoice=async function(){
  if(!profile)return;
  const cur=profile.invoice_number||'';
  const raw=prompt('適格請求書発行事業者の登録番号 (T+13桁) を入力してください。\n免税事業者など未登録の場合は空欄のままにしてください。',cur);
  if(raw===null)return;
  const t=normInvoiceNo(raw);
  if(!isValidInvoiceNo(t)){alert('登録番号は「T + 13桁の数字」で入力してください (例: T1234567890123)。');return;}
  // EF経由: profiles更新 + 会計マスタ(acc_invoice_partners)へ反映(法人=会社名/個人=氏名)
  const {data,error}=await sb.functions.invoke('reflect-my-invoice',{body:{invoice_number:t}});
  if(error||data?.error){alert('更新失敗: '+((data&&data.error)||error?.message||''));return;}
  profile.invoice_number=t||null;
  if(targetProfile&&targetProfile.id===profile.id)targetProfile.invoice_number=t||null;
  let refMsg='';
  if(data&&data.reflected)refMsg='\n会計マスタにも反映: 「'+(data.partner||'')+'」'+(data.matched?'(既存の正式名称に一致)':'');
  else if(data&&data.unmatched)refMsg='\n⚠ 会計マスタに正式名称の取引先「'+(data.partner||'')+'」が見つかりませんでした。会計側で正式名称の取引先を登録すると次回から自動反映されます。';
  alert(t?('✓ 登録番号を保存しました: '+t+refMsg):'✓ 登録番号を「未登録」にしました');
  if(currentData)renderResults(currentData);
};

function escHtml(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function fmtYen(n){return '¥'+Math.round(Number(n)||0).toLocaleString();}

function thisMonth(){
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
}

async function doLogin(){
  const email=$('login-email').value.trim();
  const pw=$('login-pw').value;
  const err=$('login-err');
  err.style.display='none';
  if(!email||!pw){err.textContent='メールとパスワードを入力してください';err.style.display='block';return;}
  const {data,error}=await sb.auth.signInWithPassword({email,password:pw});
  if(error){err.textContent='ログイン失敗: '+error.message;err.style.display='block';return;}
  session=data.session;
  await postLogin();
}

async function postLogin(){
  // profile を取得
  const {data,error}=await sb.from('profiles').select('id, display_name, role, phone, is_company_owner, invoice_number').eq('id',session.user.id).maybeSingle();
  if(error||!data){
    alert('プロファイルが見つかりません: '+(error?.message||'unknown'));
    return doLogout();
  }
  profile=data;
  // 会計ツールの適格請求書マスタ(取引先→T番号)を取得 (会社名でのライブ参照用)
  try{const {data:ip}=await sb.rpc('get_invoice_partner_numbers');invPartners=ip||[];}catch(_){invPartners=[];}
  $('screen-login').style.display='none';
  $('screen-main').style.display='block';
  $('hdr-user').textContent=`${profile.display_name||session.user.email}${(profile.role==='admin'||profile.role==='super_admin')?' (管理者)':''}`;
  $('ym-input').value=thisMonth();
  if(profile.role==='admin'||profile.role==='super_admin'){
    $('admin-toggle-wrap').style.display='inline-flex';
    // メンバー管理は中央マスタ(人材マスタ)に一本化したため非表示
    $('btn-central-master').style.display='inline-flex';
  }

  if(!profile.phone){
    await promptPhone();
  }
  // 法人配下ドライバーはログイン不可(中央人材マスタ staff_master 参照)。個人/オーナー/担当者/社員/管理者は可。
  const isAdmin=profile.role==='admin'||profile.role==='super_admin';
  if(profile.phone && !isAdmin){
    const blocked=await checkCentralGate(profile.phone);
    if(blocked){ showCorpBlockScreen(); return; }
  }
  // 法人オーナー/管理者には「自社の担当者管理」ボタンを表示
  const showContact=isAdmin||(window._myCentral&&(window._myCentral.is_company_owner||window._myCentral.category==='法人オーナー'));
  if(showContact)$('btn-contact-mgr').style.display='inline-flex';
  if(profile.phone)loadAll();
}

window.toggleContact=async function(match_key,checked,el){
  if(el)el.disabled=true;
  try{
    const {data,error}=await sb.functions.invoke('staff-set-contact',{body:{action:'set',match_key,is_contact:checked}});
    if(error||data?.error){ alert('更新失敗: '+((data&&data.error)||error?.message||'unknown')); if(el){el.checked=!checked;} }
  }catch(e){ alert('更新失敗: '+(e.message||e)); if(el){el.checked=!checked;} }
  finally{ if(el)el.disabled=false; }
};

// 人材マスタ 絞り込み: 区分(法人/個人/社員…) + 会社名・個人名テキスト
window.filterCentral=function(){
  const cat=($('cm-filter-cat')?$('cm-filter-cat').value:'')||'';
  const q=(($('cm-filter-q')?$('cm-filter-q').value:'')||'').trim().toLowerCase();
  let shown=0;
  document.querySelectorAll('.cm-row').forEach(row=>{
    const okCat=!cat||row.getAttribute('data-cat')===cat;
    const okQ=!q||(row.getAttribute('data-search')||'').indexOf(q)>=0;
    const show=okCat&&okQ;
    row.style.display=show?'':'none';
    if(show)shown++;
  });
  const c=$('cm-filter-count'); if(c)c.textContent=`${shown}名`;
};
window.saveCentral=async function(match_key,i,btn){
  const category=$('cm-cat-'+i).value;
  const company_name=$('cm-co-'+i).value;
  const phone=$('cm-ph-'+i)?$('cm-ph-'+i).value:'';
  const invoice_number=$('cm-inv-'+i)?$('cm-inv-'+i).value:'';
  if(btn){btn.disabled=true;btn.textContent='...';}
  try{
    const {data,error}=await sb.functions.invoke('staff-set-contact',{body:{action:'set_category',match_key,category,company_name,phone,invoice_number}});
    if(error||data?.error){ alert('保存失敗: '+((data&&data.error)||error?.message||'')); }
    else if(btn){ btn.textContent='✓'; setTimeout(()=>{btn.textContent='保存';btn.disabled=false;},1200); return; }
  }catch(e){ alert('保存失敗: '+(e.message||e)); }
  if(btn){btn.disabled=false;btn.textContent='保存';}
};

// 中央人材マスタで法人配下判定。法人配下かつ owner/担当者でなければ true(ブロック)。中央未登録は通す(fail-open)。
async function checkCentralGate(phone){
  try{
    const ph=normalizePhone(phone);
    if(!ph)return false;
    const {data}=await sb.from('staff_master').select('category,is_company_owner,is_company_contact,company_name').eq('phone',ph).maybeSingle();
    window._myCentral=data||null;
    if(!data)return false;
    if(data.category==='法人配下' && !data.is_company_owner && !data.is_company_contact){ window._blockInfo=data; return true; }
    return false;
  }catch(_){ return false; }
}

async function promptPhone(){
  return new Promise(resolve=>{
    const overlay=document.createElement('div');
    overlay.className='modal-overlay';
    overlay.innerHTML=`<div class="modal">
      <h3>📱 電話番号を登録</h3>
      <p>支払明細を表示するために、電話番号を登録してください (初回のみ)。新聞シフト/アスクル/デリバリー で登録されている番号と同じものを入力してください。</p>
      <input type="tel" id="reg-phone" class="input" placeholder="例 090-1234-5678" style="width:100%;margin-bottom:8px;">
      <div id="reg-err" style="color:var(--danger);font-size:12px;margin-bottom:8px;display:none;"></div>
      <div style="display:flex;gap:8px;justify-content:flex-end;">
        <button class="btn-ghost" onclick="cancelPhonePrompt()">後で</button>
        <button class="btn" onclick="savePhonePrompt()">登録</button>
      </div>
    </div>`;
    document.body.appendChild(overlay);
    window._phonePromptResolve=resolve;
    window._phonePromptOverlay=overlay;
  });
}

window.cancelPhonePrompt=function(){
  if(window._phonePromptOverlay)window._phonePromptOverlay.remove();
  if(window._phonePromptResolve)window._phonePromptResolve();
};

window.savePhonePrompt=async function(){
  const raw=$('reg-phone').value;
  const phone=normalizePhone(raw);
  const err=$('reg-err');
  err.style.display='none';
  if(!phone||phone.length<10){err.textContent='正しい電話番号を入力してください';err.style.display='block';return;}
  const {error}=await sb.from('profiles').update({phone}).eq('id',session.user.id);
  if(error){err.textContent='保存失敗: '+error.message;err.style.display='block';return;}
  profile.phone=phone;
  if(window._phonePromptOverlay)window._phonePromptOverlay.remove();
  if(window._phonePromptResolve)window._phonePromptResolve();
};

async function changePhone(){
  const cur=profile.phone||'';
  const raw=prompt(`登録電話番号: ${cur||'(未登録)'}\n新しい番号を入力してください (ハイフン可):`,cur);
  if(raw===null)return;
  const phone=normalizePhone(raw);
  if(!phone||phone.length<10){alert('正しい電話番号を入力してください');return;}
  const {error}=await sb.from('profiles').update({phone}).eq('id',session.user.id);
  if(error){alert('保存失敗: '+error.message);return;}
  profile.phone=phone;
  alert('✓ 電話番号を更新しました');
  loadAll();
}

async function searchByName(query){
  const results=$('admin-name-results');
  results.style.display='block';
  results.innerHTML='<div style="padding:10px;color:var(--text-sub);font-size:12px;"><span class="spinner"></span> 検索中...</div>';
  // 個人は氏名で検索。法人は「会社名でまとめる」候補から現場ツール(新聞/アスクル/デリバリー)横断で集計。
  const {data,error}=await sb.from('profiles').select('id, display_name, phone, role, company, position, is_company_owner, invoice_number').ilike('display_name','%'+query+'%').limit(50);
  if(error){results.innerHTML=`<div style="padding:10px;color:var(--danger);font-size:12px;">検索エラー: ${escHtml(error.message)}</div>`;return;}
  window._searchRes=data||[];
  const canEditOwner=profile?.role==='super_admin';
  // 会社(法人)候補: 入力語を会社名として現場ツール横断で集計 (複数現場にまたがる業者を統合)

    const phoneCell=p.phone

window.toggleOwner=async function(profileId,newValue){
  if(!confirm(newValue?'この人を法人オーナーに設定しますか?\n→ 自分の支払明細を見られるようになります':'オーナー設定を解除しますか?\n→ 法人ドライバー扱いになり、自分の金額は見られなくなります'))return;
  const {data:ud,error}=await sb.from('profiles').update({is_company_owner:newValue}).eq('id',profileId).select('id');
  if(error){alert('更新失敗: '+error.message);return;}
  if(!ud||!ud.length){alert('更新できませんでした（権限不足の可能性）');return;}
  // 直近の検索を再実行して反映
  if($('admin-name-input').value.trim())await searchByName($('admin-name-input').value.trim());
  // 現在表示中の人なら targetProfile も更新
  if(targetProfile?.id===profileId){
    targetProfile.is_company_owner=newValue;
    if(currentData)renderResults(currentData);
  }
};

// 各ツールEFを叩いて {shift,askul,delivery} を返す。phone/name/company いずれかで照合。
async function fetchTools(phone, name, company, ym){
  const userJwt=await freshToken();
  const callEf=async (url,anon)=>{
    try{
      const resp=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+anon},body:JSON.stringify({phone:phone||'',name:name||'',company:company||'',year_month:ym,auth_token:userJwt})});
      if(!resp.ok)return {error:`HTTP ${resp.status}`,code:resp.status};
      return await resp.json();
    }catch(e){return {error:e.message};}
  };
  const [shift,askul,delivery]=await Promise.all([callEf(SHIFT_URL,SUPABASE_ANON),callEf(ASKUL_URL,ASKUL_ANON),callEf(DELIVERY_URL,DELIVERY_ANON)]);
  return {shift,askul,delivery};
}

let _companyPayees=[];
function renderCompanyAgg(company, ym, tools){
  // 各ツールの支払先(法人配下ドライバー)を横断で集約。st=元明細(日別),toolKey=詳細描画用
  const payees=[];
  (tools.shift&&tools.shift.statements||[]).forEach(s=>payees.push({tool:'新聞シフト',color:'#0ea5e9',toolKey:'shift',name:s.staff_name,amount:Number(s.grand_total)||0,sub:s.primary_area||'',st:s}));
  (tools.askul&&tools.askul.statements||[]).forEach(s=>payees.push({tool:'アスクル',color:'#f97316',toolKey:'askul',name:s.driver_name,amount:Number(s.payment_amount)||0,sub:s.company_name||'',st:s}));
  (tools.delivery&&tools.delivery.statements||[]).forEach(s=>payees.push({tool:'デリバリー',color:'#10b981',toolKey:'delivery',name:s.driver_name,amount:Number(s.payment_amount)||0,sub:s.company_name||'',st:s}));
  payees.forEach((p,i)=>p._i=i);
  _companyPayees=payees;
  window._lastCompany=company; window._lastCompanyYm=ym;
  const total=payees.reduce((a,p)=>a+p.amount,0);
  const errs=[['新聞',tools.shift],['アスクル',tools.askul],['デリバリー',tools.delivery]].filter(([_,t])=>t&&t.error).map(([n])=>n);
  const byTool={};
  payees.forEach(p=>{ (byTool[p.tool]=byTool[p.tool]||{color:p.color,items:[],sum:0}); byTool[p.tool].items.push(p); byTool[p.tool].sum+=p.amount; });

  // 会計「車両リース・貸付金マスタ」から控除: 会社名で部分一致した全取引先行を合算。
  // 無ければ支払先(氏名)ごとに完全一致で拾う。
  let {items:dedItems}=accCompanyDeduction(company,ym);
  if(!dedItems.length){
    payees.forEach(p=>{ const d=accDeductionFor(p.name,ym); if(d.lease>0)dedItems.push({name:`${p.name}（車両リース料）`,amount:d.lease}); if(d.loan>0)dedItems.push({name:`${p.name}（貸付金返済）`,amount:d.loan}); });

  const dedTotal=dedItems.reduce((a,d)=>a+d.amount,0);

  let html=`<div class="grand-total-card">
    <div class="label">🏢 ${escHtml(company)} / ${escHtml(ym)} ${dedTotal>0?'差引後 ':''}会社合計支払額（3ツール横断）</div>
    <div class="value">${fmtYen(net)}</div>
    <div style="font-size:11px;color:#92400e;margin-top:6px;">支払先 ${payees.length}件${dedTotal>0?` ／ ツール合計 ${fmtYen(total)} − 控除 ${fmtYen(dedTotal)}`:''} ${errs.length?`／⚠ 取得エラー: ${errs.join('・')}`:''}</div>
  </div>`;
  if(payees.length){
    html+=`<div style="margin-bottom:12px;text-align:right;"><button class="btn btn-pdf" style="background:#0ea5e9;" onclick="downloadCompanyPdf()">📦 法人まとめPDF（会社合計＋全支払先の明細）</button></div>`;
  }
  if(dedTotal>0){
    html+=`<div class="card" style="padding:0;overflow:hidden;margin-bottom:10px;border-color:#f59e0b;">
      <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:#fffbeb;border-bottom:1px solid #fde68a;">
        <span style="font-weight:700;font-size:12px;color:#92400e;">💸 控除（会計マスタ連携）</span>
        <span style="font-weight:700;font-size:13px;color:#b45309;">-${fmtYen(dedTotal)}</span>
      </div>`;
    dedItems.forEach(d=>{ html+=`<div style="padding:8px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;font-size:12px;"><span>${escHtml(d.name)}</span><span style="color:#b45309;font-weight:600;">-${fmtYen(d.amount)}</span></div>`; });
    html+=`</div>`;
  }
  if(!payees.length){
    html+=`<div class="card" style="line-height:1.8;">「${escHtml(company)}」に該当する支払が見つかりませんでした。<br><span style="font-size:12px;color:var(--text-sub);">・現場ツールの会社名(法人名)と表記が合っているかご確認ください（一部一致でOK：例「ラストワンマイル」「ロジ」など）。<br>・対象月(${escHtml(ym)})の明細が確定・公開済みかもご確認ください。</span></div>`;
  }else{
    Object.keys(byTool).forEach(tool=>{
      const g=byTool[tool];
      html+=`<div class="card" style="padding:0;overflow:hidden;margin-bottom:10px;">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:#f8fafc;border-bottom:1px solid var(--border);">
          <span style="font-weight:700;font-size:12px;color:${g.color};">${tool}</span>
          <span style="font-weight:700;font-size:13px;">${fmtYen(g.sum)} <span style="color:var(--text-sub);font-weight:400;font-size:11px;">(${g.items.length}名)</span></span>
        </div>`;
      g.items.forEach(p=>{
        html+=`<div style="padding:9px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;gap:10px;">
          <div>
            <div style="font-weight:600;font-size:13px;">${escHtml(p.name||'(名称なし)')}</div>
            ${p.sub?`<div style="font-size:11px;color:var(--text-sub);margin-top:2px;">${escHtml(p.sub)}</div>`:''}
          </div>
          <div style="display:flex;align-items:center;gap:10px;">
            <div style="font-weight:700;font-size:14px;">${fmtYen(p.amount)}</div>
            <button class="btn" style="font-size:11px;padding:4px 10px;" onclick="togglePayeeDetail(${p._i})">📋 明細</button>
          </div>
        </div>
        <div id="payee-detail-${p._i}" style="display:none;padding:0 14px 12px;border-bottom:1px solid var(--border);overflow-x:auto;"></div>`;
      });
      html+=`</div>`;
    });
  }
  $('result-area').innerHTML=html;
}

// ── 月次「取引先一覧」(P0再定義): 取引先 = company_name があればそれ / 無ければ個人(電話・氏名) ──
const _CHAR_FOLD={'髙':'高','﨑':'崎','嵜':'崎','斎':'斉','齋':'斉','齊':'斉','邊':'辺','邉':'辺','澤':'沢','濱':'浜','濵':'浜','廣':'広','德':'徳','惠':'恵','槇':'槙','冨':'富','峯':'峰','舘':'館','曾':'曽','桒':'桑','渕':'淵','淸':'清','靑':'青','眞':'真','圓':'円','假':'仮','國':'国','瀨':'瀬','增':'増','莊':'荘','禮':'礼','ヶ':'ケ','ヵ':'カ'};
function nmKeyV(s){ const t=String(s||'').normalize('NFKC').replace(/[\s　]/g,''); let o=''; for(const ch of t)o+=_CHAR_FOLD[ch]||ch; return o; }

// 3ツールを list_all(管理者限定)で叩いて当月全件を取得
async function fetchAllTools(ym){
  const userJwt=await freshToken();
  const callEf=async(url,anon)=>{ try{ const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+anon},body:JSON.stringify({list_all:true,year_month:ym,auth_token:userJwt})}); if(!r.ok)return{error:'HTTP '+r.status,code:r.status}; return await r.json(); }catch(e){return{error:e.message};} };
  const [shift,askul,delivery]=await Promise.all([callEf(SHIFT_URL,SUPABASE_ANON),callEf(ASKUL_URL,ASKUL_ANON),callEf(DELIVERY_URL,DELIVERY_ANON)]);
  return {shift,askul,delivery};
}

// 全ツールの明細を取引先単位にグルーピング
function groupPayees(tools){
  const groups=new Map();
  const add=(toolKey,tool,color,st,name,company,phone,amount,sub)=>{
    const hasCo = company && String(company).trim();
    let key,kind,label;
    if(hasCo){ key='C:'+nmKeyV(company); kind='company'; label=String(company).trim(); }
    else { const ph=normalizePhone(phone||''); key = ph?('P:'+ph):('N:'+nmKeyV(name)); kind='person'; label=String(name||'').trim(); }
    let g=groups.get(key);
    if(!g){ g={key,kind,label,company:hasCo?String(company).trim():'',phone:normalizePhone(phone||''),items:[],total:0}; groups.set(key,g); }
    // 個人グループでlabelが空なら名前で補完
    if(!g.label && name) g.label=String(name).trim();
    g.items.push({toolKey,tool,color,name:String(name||'').trim(),amount:Number(amount)||0,sub:sub||'',st});
    g.total+=Number(amount)||0;
  };
  (tools.shift&&tools.shift.statements||[]).forEach(s=>add('shift','新聞シフト','#0ea5e9',s,s.staff_name,s.company_name,s.phone,s.grand_total,s.primary_area));
  (tools.askul&&tools.askul.statements||[]).forEach(s=>add('askul','アスクル','#f97316',s,s.driver_name,s.company_name,s.phone,s.payment_amount,''));
  (tools.delivery&&tools.delivery.statements||[]).forEach(s=>add('delivery','デリバリー','#10b981',s,s.driver_name,s.company_name,s.phone,s.payment_amount,''));
  return [...groups.values()];
}

let _allGroups=[];
async function loadAllPayees(){
  const ym=$('ym-input').value;
  if(!ym){alert('対象月を選択してください');return;}
  const area=$('result-area');
  area.innerHTML=`<div class="card center"><div class="spinner"></div> ${escHtml(ym)} の取引先一覧を集計中（新聞・アスクル・デリバリー横断）...</div>`;
  $('btn-summary-pdf').disabled=true; $('btn-all-pdf').disabled=true; currentData=null;
  try{
    const [tools]=await Promise.all([fetchAllTools(ym),loadAccDeductions(ym)]);
    const authErr=[['新聞',tools.shift],['アスクル',tools.askul],['デリバリー',tools.delivery]].filter(([_,t])=>t&&t.code===403);
    if(authErr.length===3){ area.innerHTML=`<div class="card" style="color:var(--danger);">取引先一覧は管理者のみ利用できます。</div>`; return; }
    renderPayeeList(ym,groupPayees(tools),tools);
  }catch(e){ area.innerHTML=`<div class="card" style="color:var(--danger);">取引先一覧の取得に失敗: ${escHtml(e.message||String(e))}</div>`; }
}

function renderPayeeList(ym,groups,tools){
  groups.sort((a,b)=>b.total-a.total);
  groups.forEach((g,i)=>g._i=i);
  _allGroups=groups;
  const grand=groups.reduce((a,g)=>a+g.total,0);
  const errs=[['新聞',tools.shift],['アスクル',tools.askul],['デリバリー',tools.delivery]].filter(([_,t])=>t&&t.error).map(([n])=>n);
  const nCorp=groups.filter(g=>g.kind==='company').length, nPer=groups.length-nCorp;
  let html=`<div class="grand-total-card">
    <div class="label">📋 ${escHtml(ym)} 取引先一覧 合計支払額（3ツール横断）</div>
    <div class="value">${fmtYen(grand)}</div>
    <div style="font-size:11px;color:#92400e;margin-top:6px;">取引先 ${groups.length}件（法人/屋号 ${nCorp}・個人 ${nPer}）${errs.length?` ／⚠ 取得エラー: ${errs.join('・')}`:''}</div>
  </div>`;
  if(!groups.length){ html+=`<div class="card" style="line-height:1.8;">該当する明細がありません。<br><span style="font-size:12px;color:var(--text-sub);">対象月(${escHtml(ym)})が各ツールで確定・公開済みかご確認ください。</span></div>`; $('result-area').innerHTML=html; return; }
  html+=`<div class="card" style="padding:0;overflow:hidden;">`;
  groups.forEach(g=>{
    const badge = g.kind==='company'
      ? `<span style="background:#dbeafe;color:#1e40af;padding:1px 7px;border-radius:8px;font-size:10px;margin-left:6px;">法人/屋号</span>`
      : `<span style="background:#dcfce7;color:#15803d;padding:1px 7px;border-radius:8px;font-size:10px;margin-left:6px;">個人</span>`;
    const toolTags=g.items.map(it=>`<span style="color:${it.color};font-size:10px;font-weight:600;">${it.tool.replace('新聞シフト','新聞')}</span>`).join(' ・ ');
    html+=`<div style="padding:10px 14px;border-bottom:1px solid var(--border);">
      <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap;">
        <div style="min-width:0;">
          <div style="font-weight:700;font-size:14px;">${escHtml(g.label||'(名称なし)')}${badge}</div>
          <div style="font-size:11px;color:var(--text-sub);margin-top:2px;">${toolTags}${g.items.length>1?` ／ ${g.items.length}件`:''}</div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;">
          <div style="font-weight:800;font-size:15px;">${fmtYen(g.total)}</div>
          <button class="btn" style="font-size:11px;padding:4px 10px;" onclick="togglePayeeGroup(${g._i})">📋 内訳</button>
          <button class="btn btn-secondary" style="font-size:11px;padding:4px 10px;" onclick="openPayeeGroup(${g._i})">→ 個別/PDF</button>
        </div>
      </div>
      <div id="pg-detail-${g._i}" style="display:none;margin-top:8px;"></div>
    </div>`;
  });
  html+=`</div>`;
  $('result-area').innerHTML=html;
}

function _payeeDetailFor(it){
  const st=it.st||{};
  let h='';
  if(it.toolKey==='shift')h=renderShiftDetail(st.rows||[]);
  else if(it.toolKey==='askul')h=renderAskulDetail(st.daily_rows||[]);
  else if(it.toolKey==='delivery')h=renderDeliveryDetail(st.daily_rows||[]);
  return h||'<div style="color:var(--text-sub);font-size:12px;padding:6px 0;">日別明細なし</div>';
}
window.togglePayeeGroup=function(i){
  const g=(_allGroups||[]).find(x=>x._i===i); const box=$('pg-detail-'+i); if(!g||!box)return;
  if(box.style.display==='none'){
    if(!box.dataset.loaded){
      let h='';
      g.items.forEach(it=>{ h+=`<div style="border:1px solid var(--border);border-radius:6px;margin-bottom:6px;overflow:hidden;">
        <div style="display:flex;justify-content:space-between;padding:6px 10px;background:#f8fafc;font-size:12px;"><span style="color:${it.color};font-weight:700;">${escHtml(it.tool)}${it.sub?` <span style="color:var(--text-sub);font-weight:400;">${escHtml(it.sub)}</span>`:''}${g.kind==='company'&&it.name?` <span style="color:var(--text-sub);font-weight:400;">/ ${escHtml(it.name)}</span>`:''}</span><span style="font-weight:700;">${fmtYen(it.amount)}</span></div>
        <div style="padding:6px 10px;overflow-x:auto;">${_payeeDetailFor(it)}</div></div>`; });
      box.innerHTML=h; box.dataset.loaded='1';
    }
    box.style.display='block';
  } else box.style.display='none';
};
window.openPayeeGroup=function(i){
  const g=(_allGroups||[]).find(x=>x._i===i); if(!g)return;
  if(g.kind==='company'){ $('admin-name-input').value=g.company||g.label; loadCompany(g.company||g.label); }
  else { $('admin-name-input').value=g.label||''; $('admin-phone-input').value=g.phone||''; loadFor(g.phone||'', g.label||'', null, true); }
  window.scrollTo({top:0,behavior:'smooth'});
};

// 会社集計: 支払先の日別明細をインラインで開閉
window.togglePayeeDetail=function(idx){
  const p=(_companyPayees||[]).find(x=>x._i===idx);
  const box=$('payee-detail-'+idx);
  if(!p||!box)return;
  if(box.style.display==='none'){
    if(!box.dataset.loaded){
      const st=p.st||{};
      let h='';

async function loadTargetProfile(phone, tp){

  if(tp){targetProfile=tp;return;}

// ── 会計「車両リース・貸付金マスタ」からの控除連携 (RPC get_driver_deductions) ──
// 管理者/経理は全取引先、一般は本人分のみ返る。会計と同じロジックで当月控除を算出。
let _accDed={rows:[],ov:[]};
async function loadAccDeductions(month){
  try{
    const {data,error}=await sb.rpc('get_driver_deductions',{p_month:month});
    if(error||!data){_accDed={rows:[],ov:[]};return;}
    _accDed={rows:data.rows||[],ov:data.overrides||[]};
  }catch(e){_accDed={rows:[],ov:[]};}
}
function _dedToIdx(s){const a=String(s||'').split('-').map(Number);return a[0]&&a[1]?a[0]*12+(a[1]-1):null;}
function _dedIdxToYm(n){return `${Math.floor(n/12)}-${String((n%12)+1).padStart(2,'0')}`;}
// 当月の貸付返済額(月別上書き反映・完済後0)。会計 loanDueWithOverrides と同一。
function _loanDue(row,month,loanOv){
  const total=Math.round(Number(row.loan_total)||0),monthly=Math.round(Number(row.loan_monthly)||0);
  const start=_dedToIdx(row.loan_start||''),target=_dedToIdx(month);
  if(start===null||target===null||target<start)return 0;
  if(monthly<=0&&loanOv.size===0)return 0;
  let cum=0;
  for(let t=start;t<=target;t++){
    const key=_dedIdxToYm(t);
    let due=loanOv.has(key)?Math.round(loanOv.get(key)):monthly;
    if(due<0)due=0;
    if(total>0)due=Math.min(due,Math.max(0,total-cum));
    if(t===target)return due;
    cum+=due;
  }
  return 0;
}
// 1行(会計マスタ)の当月控除 {lease,loan,total}
function _accDedForRow(row,month){
  const key=nmKey(row.name||'');
  const lo=(_accDed.ov||[]).find(o=>nmKey(o.name||'')===key&&o.month===month&&o.lease!=null&&String(o.lease)!=='');
  const lease=lo?Math.round(Number(lo.lease)||0):Math.round(Number(row.lease_monthly)||0);
  const loanOv=new Map();
  (_accDed.ov||[]).forEach(o=>{if(nmKey(o.name||'')===key&&o.loan!=null&&String(o.loan)!==''&&o.month)loanOv.set(o.month,Math.round(Number(o.loan)||0));});
  const loan=_loanDue(row,month,loanOv);
  return {lease,loan,total:lease+loan};
}
// 取引先名(個人=氏名)を完全一致で照合 → {lease,loan,total}
function accDeductionFor(name,month){
  const key=nmKey(name||'');if(!key)return {lease:0,loan:0,total:0};
  const row=(_accDed.rows||[]).find(r=>nmKey(r.name||'')===key);
  return row?_accDedForRow(row,month):{lease:0,loan:0,total:0};
}
// 法人: 会社名を部分一致で照合し、該当する全取引先行を合算 (会社名行・会社配下の個別行の両方を拾う)
function accCompanyDeduction(company,month){
  const key=nmKey(company||'');if(!key)return {items:[],total:0};
  const items=[];
  (_accDed.rows||[]).forEach(row=>{
    if(!nmKey(row.name||'').includes(key))return;
    const d=_accDedForRow(row,month);
    if(d.lease>0)items.push({name:`${row.name}（車両リース料）`,amount:d.lease});
    if(d.loan>0)items.push({name:`${row.name}（貸付金返済）`,amount:d.loan});
  });
  return {items,total:items.reduce((a,x)=>a+x.amount,0)};
}
// 明細ビューア用の差引項目配列に変換 (車両リース料 / 貸付金返済)
function accDedItems(name,month){
  const d=accDeductionFor(name,month);const items=[];
  if(d.lease>0)items.push({label:'車両リース料',amount:d.lease,active:true});
  if(d.loan>0)items.push({label:'貸付金返済',amount:d.loan,active:true});
  return items;
}

async function loadFor(phone, name, tp, fromCompany){
  window._fromCompany=!!fromCompany;
  const ym=$('ym-input').value;
  if(!ym){alert('対象月を選択してください');return;}
  if(!phone && !(name||'').trim()){alert('電話番号または名前で対象者を指定してください');return;}
  const area=$('result-area');
  area.innerHTML='<div class="card center"><div class="spinner"></div> 3ツールに問い合わせ中...</div>';
  await loadTargetProfile(phone, tp);

  const userJwt=await freshToken();
  const callEf=async (url,anon)=>{
    try{
      const resp=await fetch(url,{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':'Bearer '+anon},
        body:JSON.stringify({phone,name:name||'',year_month:ym,auth_token:userJwt})
      });
      if(resp.status===401)return {error:'認証エラー',code:'AUTH'};
      if(resp.status===403)return {error:'この明細にアクセスする権限がありません',code:'FORBIDDEN'};
      if(!resp.ok)return {error:`HTTP ${resp.status}`};
      return await resp.json();
    }catch(e){return {error:e.message};}
  };

  // 控除は会計「車両リース・貸付金マスタ」から連携 (取引先名=氏名で照合)
  const [shift,askul,delivery]=await Promise.all([
    callEf(SHIFT_URL,SUPABASE_ANON),
    callEf(ASKUL_URL,ASKUL_ANON),
    callEf(DELIVERY_URL,DELIVERY_ANON),
    loadAccDeductions(ym),
  ]);
  // 取引先名: NexPort表示名 → 無ければ各ツールの明細上の氏名
  const nm=(targetProfile&&targetProfile.display_name)
    ||(shift&&shift.statements&&shift.statements[0]&&shift.statements[0].staff_name)
    ||(askul&&askul.statements&&askul.statements[0]&&askul.statements[0].driver_name)
    ||(delivery&&delivery.statements&&delivery.statements[0]&&delivery.statements[0].driver_name)
    ||name||'';
  const deductions=accDedItems(nm,ym);
  renderResults({shift,askul,delivery,deductions,ym,phone});
}

function renderResults({shift,askul,delivery,deductions,ym,phone}){
  currentData={shift,askul,delivery,deductions:deductions||[],ym,phone};
  const area=$('result-area');
  const toolTotal=calcTotal({shift,askul,delivery});
  const foundCount=[shift,askul,delivery].filter(r=>r&&r.found).length;
  const deds=(deductions||[]).filter(d=>d.active);
  const deductionTotal=deds.reduce((s,d)=>s+(Number(d.amount)||0),0);
  const grandTotal=toolTotal-deductionTotal;
  $('btn-summary-pdf').disabled=foundCount===0;
  $('btn-all-pdf').disabled=foundCount===0;

  let html='';
  if(window._fromCompany&&window._lastCompany){
    html+=`<div style="margin-bottom:12px;"><button class="btn btn-secondary" onclick="loadCompany(window._lastCompany)">← 「${escHtml(window._lastCompany)}」法人集計に戻る</button></div>`;
  }
  if(foundCount>0){
    if(deductionTotal>0){
      html+=`<div class="grand-total-card">
        <div class="label">${escHtml(ym)} 差引後 合計支払額 (${foundCount}ツール)</div>
        <div class="value">${fmtYen(grandTotal)}</div>
        <div style="font-size:11px;color:#92400e;margin-top:6px;">ツール合計 ${fmtYen(toolTotal)} − 差引 ${fmtYen(deductionTotal)}</div>
      </div>`;
    }else{
      html+=`<div class="grand-total-card">
        <div class="label">${escHtml(ym)} 合計支払額 (${foundCount}ツール)</div>
        <div class="value">${fmtYen(toolTotal)}</div>
      </div>`;
    }
  }

  // 適格請求書 登録番号 (手入力優先 / 無ければ会社名で会計マスタから自動取得)
  if(foundCount>0){
    const res=resolveInvoiceNo(targetProfile,ym);
    const invHtml=res
      ?`${escHtml(res.no)} <span style="font-size:11px;color:var(--text-sub);font-weight:400;">(${res.src})</span>`
      :'<span style="color:var(--text-sub);font-weight:400;">未登録（免税事業者 / 会社名未設定）</span>';
    html+=`<div class="card" style="padding:10px 14px;display:flex;justify-content:space-between;align-items:center;gap:10px;">
      <span style="font-size:12px;color:var(--text-sub);">🧾 適格請求書 登録番号</span>
      <span style="font-size:13px;font-weight:600;font-family:monospace;">${invHtml}</span>
    </div>`;
  }

  // 差引項目カード (active なものが 1 件以上ある場合のみ表示)
  if(deds.length>0){
    html+=`<div class="card" style="border-color:#fbbf24;background:#fffbeb;">
      <div class="card-header"><span style="font-weight:700;color:#92400e;">💸 差引項目</span></div>
      ${deds.map(d=>`<div class="amount-row"><span class="label">${escHtml(d.label)}</span><span class="value" style="color:#dc2626;">−${fmtYen(d.amount)}</span></div>`).join('')}
      <div class="divider"></div>
      <div class="amount-row"><span class="label" style="font-weight:600;">差引合計</span><span class="value" style="color:#dc2626;font-weight:700;">−${fmtYen(deductionTotal)}</span></div>
    </div>`;
  }

  html+=renderShiftCard(shift,ym);
  html+=renderAskulCard(askul,ym);
  html+=renderDeliveryCard(delivery,ym);

  if(foundCount===0){
    html+=`<div class="card empty">
      <div style="font-size:32px;margin-bottom:8px;">🔎</div>
      <div>該当データなし</div>
      <div class="muted" style="margin-top:6px;">電話番号 ${escHtml(phone)} は3ツールいずれにも登録されていないか、${escHtml(ym)} のデータがありません。</div>
    </div>`;
  }

  area.innerHTML=html;
}

function calcTotal({shift,askul,delivery}){
  return (shift?.statements||[]).reduce((s,r)=>s+(shouldHide(r,'shift')?0:(r.grand_total||0)),0)
        +(askul?.statements||[]).reduce((s,r)=>s+(shouldHide(r,'askul')?0:(r.payment_amount||0)),0)
        +(delivery?.statements||[]).reduce((s,r)=>s+(shouldHide(r,'delivery')?0:(r.payment_amount||0)),0);
}

// 法人 (非オーナー) / 社員 は金額非表示。管理者 (admin/super_admin) は常に表示。
// オーナーは NexPort profiles.is_company_owner で判定 (shift では biz_type='法人' でも見える)
function shouldHide(stmt,source){
  if(profile?.role==='admin'||profile?.role==='super_admin')return false;
  const isOwner=targetProfile?.is_company_owner===true;
  if(isOwner)return false;
  if(source==='shift')return stmt.biz_type==='法人';
  return stmt.business_type==='corporation'||stmt.business_type==='employee';
}

function hideMsg(){return '<div class="muted" style="padding:6px 10px;background:#f1f5f9;border-radius:6px;font-size:11px;">※ 法人所属 / 社員区分のため金額は非表示 (会社オーナーまたは管理者にお問い合わせください)</div>';}

function ownerName(){
  if(!currentData)return '';
  const s=currentData.shift?.statements?.[0];
  if(s?.staff_name)return s.staff_name;
  const a=currentData.askul?.statements?.[0];
  if(a?.driver_name)return a.driver_name;
  const d=currentData.delivery?.statements?.[0];
  if(d?.driver_name)return d.driver_name;
  return profile?.display_name||'';
}

function safeFile(s){return String(s||'').replace(/[\\/:*?"<>|]/g,'_');}

function eraLabel(y,m){
  const reiwa=y-2018;
  const era=reiwa>=1?`令和${reiwa===1?'元':reiwa}年`:`西暦${y}年`;
  return `${era} ${m}月度`;
}

// オフスクリーンに DOM を描画 → html2canvas → jsPDF 化 → blob を返す
async function renderToPdfBlob(html){
  const stage=$('pdf-stage');
  stage.innerHTML=html;
  // 描画タイミング待ち
  await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
  const target=stage.firstElementChild;
  const canvas=await html2canvas(target,{scale:2,backgroundColor:'#ffffff',useCORS:true,logging:false});
  const {jsPDF}=window.jspdf;
  const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  const pdfWidth=pdf.internal.pageSize.getWidth();
  const pdfHeight=pdf.internal.pageSize.getHeight();
  const imgHeight=(canvas.height*pdfWidth)/canvas.width;
  let heightLeft=imgHeight,position=0;
  const data=canvas.toDataURL('image/jpeg',0.95);
  pdf.addImage(data,'JPEG',0,position,pdfWidth,imgHeight);
  heightLeft-=pdfHeight;
  while(heightLeft>0){
    position=heightLeft-imgHeight;
    pdf.addPage();
    pdf.addImage(data,'JPEG',0,position,pdfWidth,imgHeight);
    heightLeft-=pdfHeight;
  }
  stage.innerHTML='';
  return pdf;
}

// ----- サマリーPDF (支払通知書フォーマット: 支払通知書.docx ひな型準拠) -----
function buildSummaryHtml(){
  if(!currentData)return '';
  const {shift,askul,delivery,ym}=currentData;
  const [y,m]=ym.split('-').map(Number);
  const fmtNum=n=>Math.round(Number(n)||0).toLocaleString();
  const yen=n=>'￥'+fmtNum(n);
  const owner=ownerName();
  // 金額: ツール合計 − 差引項目(貸付金返済等)= 合計金額(=お支払額)
  const toolTotal=calcTotal(currentData);
  const deds=(currentData.deductions||[]).filter(d=>d.active);
  const deductionTotal=deds.reduce((s,d)=>s+(Number(d.amount)||0),0);
  const payAmount=toolTotal-deductionTotal;   // お支払額 / 合計金額
  // 営業所名: profiles.site → 無ければ新聞シフトの主稼働エリア
  const office=(targetProfile?.site||'').trim()||(shift?.statements?.[0]?.primary_area||'').trim()||'—';
  const mgmtNo=`N-${y}${String(m).padStart(2,'0')}`;
  const issueDate=`${new Date().getFullYear()}年${new Date().getMonth()+1}月${new Date().getDate()}日`;
  const inv=resolveInvoiceNo(targetProfile,ym);
  // 契約ツール一覧 (詳細=別紙のとおり の補足)
  const tools=[];
  if((shift?.statements||[]).length)   tools.push('新聞シフト 配達業務委託');
  if((askul?.statements||[]).length)   tools.push('ASKUL LOGIST 配送業務委託');
  if((delivery?.statements||[]).length)tools.push('デリバリー 配送業務委託');

  const line='border-bottom:1px solid #111;';
  // 支払内容 テーブル (ラベル+値の2列)
  const rowKv=(label,val)=>`<tr>
    <td style="width:110px;padding:8px 12px;font-size:12px;background:#f3f4f6;border:1px solid #d1d5db;font-weight:600;white-space:nowrap;">${label}</td>
    <td style="padding:8px 12px;font-size:12px;border:1px solid #d1d5db;">${val}</td></tr>`;
  const detail='別紙のとおり'+(tools.length?`<span style="font-size:10px;color:#6b7280;">（${tools.map(escHtml).join(' / ')}）</span>`:'');
  // 金額内訳 テーブル
  const dedRows=deds.map(d=>`<tr>
    <td style="padding:5px 14px;text-align:right;color:#374151;font-size:12px;">${escHtml(d.label||'差引')}</td>
    <td style="padding:5px 6px;text-align:right;font-weight:600;font-size:12px;color:#b91c1c;min-width:120px;">▲${yen(d.amount)}</td></tr>`).join('');

  return `<div style="width:760px;box-sizing:border-box;background:#fff;font-family:'Yu Gothic UI','Hiragino Sans','Hiragino Kaku Gothic Pro',sans-serif;color:#111;padding:34px 42px 30px;">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;">
      <div>
        <h1 style="margin:0;font-size:30px;font-weight:800;letter-spacing:8px;">支払通知書</h1>
        ${inv?`<div style="font-size:11px;color:#374151;margin-top:4px;letter-spacing:1px;">適格請求書等保存方式　仕入明細書 兼</div>`:''}
      </div>
      <div style="text-align:right;font-size:12px;line-height:1.9;">
        <div>発行日：${issueDate}</div>
        <div>管理番号：${escHtml(mgmtNo)}</div>
      </div>
    </div>

    <div style="margin-bottom:6px;">
      <div style="font-size:20px;font-weight:700;border-bottom:1.5px solid #111;padding-bottom:4px;display:inline-block;min-width:260px;">${escHtml(owner)}<span style="font-size:14px;font-weight:400;margin-left:24px;">様</span></div>
      ${inv?`<div style="font-size:12px;color:#111;margin-top:6px;display:flex;align-items:center;gap:8px;">
        <span style="display:inline-block;padding:1px 7px;border:1px solid #111;border-radius:3px;font-size:10px;font-weight:700;white-space:nowrap;">適格請求書発行事業者</span>
        <span>登録番号　<span style="font-weight:700;letter-spacing:.5px;">${escHtml(inv.no)}</span></span>
      </div>`:''}
    </div>
    <div style="font-size:12px;margin:12px 0 16px;">下記のとおりお支払い申し上げますので、ご確認くださいますようお願い申し上げます。</div>

    <div style="display:flex;align-items:center;gap:16px;background:#f8fafc;border:1px solid #111;border-radius:4px;padding:12px 18px;margin-bottom:20px;">
      <div style="font-size:15px;font-weight:700;letter-spacing:2px;">お支払額</div>
      <div style="font-size:28px;font-weight:800;letter-spacing:1px;flex:1;text-align:right;">${yen(payAmount)}</div>
    </div>

    <div style="font-size:13px;font-weight:700;border-left:4px solid #111;padding-left:8px;margin-bottom:8px;">支払内容</div>
    <table style="width:100%;border-collapse:collapse;margin-bottom:18px;">
      ${rowKv('ドライバー',escHtml(owner))}
      ${rowKv('年月',escHtml(eraLabel(y,m)))}
      ${rowKv('営業所',escHtml(office))}
      ${rowKv('詳細',detail)}
    </table>

    <div style="font-size:13px;font-weight:700;border-left:4px solid #111;padding-left:8px;margin-bottom:8px;">金額内訳</div>

async function downloadAllPdf(){
  if(!currentData)return;
  const btn=$('btn-all-pdf');
  btn.disabled=true;const old=btn.textContent;btn.textContent='⏳ 生成中...';
  try{
    // 1つの PDF にサマリー + 各ツール詳細を結合
    const sections=[buildSummaryHtml()];
    if(currentData.shift?.found)sections.push(buildShiftDetailHtml());
    if(currentData.askul?.found)sections.push(buildAskulDetailHtml());
    if(currentData.delivery?.found)sections.push(buildDeliveryDetailHtml());
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pdfWidth=pdf.internal.pageSize.getWidth();
    const pdfHeight=pdf.internal.pageSize.getHeight();
    const stage=$('pdf-stage');
    for(let i=0;i<sections.length;i++){
      stage.innerHTML=sections[i];
      await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
      const target=stage.firstElementChild;
      const canvas=await html2canvas(target,{scale:2,backgroundColor:'#ffffff',useCORS:true,logging:false});
      const imgHeight=(canvas.height*pdfWidth)/canvas.width;
      let heightLeft=imgHeight,position=0;
      if(i>0)pdf.addPage();
      const data=canvas.toDataURL('image/jpeg',0.95);
      pdf.addImage(data,'JPEG',0,position,pdfWidth,imgHeight);
      heightLeft-=pdfHeight;
      while(heightLeft>0){
        position=heightLeft-imgHeight;
        pdf.addPage();
        pdf.addImage(data,'JPEG',0,position,pdfWidth,imgHeight);
        heightLeft-=pdfHeight;
      }
    }
    stage.innerHTML='';
    const fname=safeFile(`${currentData.ym}_統合明細_${ownerName()}.pdf`);
    pdf.save(fname);
  }catch(e){alert('PDF生成失敗: '+e.message);}
  btn.textContent=old;btn.disabled=false;
}

function buildCompanyCoverHtml(company, ym, payees, dedItems, dedTotal, toolTotal){
  const [y,m]=ym.split('-').map(Number);
  const fmtNum=n=>Math.round(Number(n)||0).toLocaleString();
  const yen=n=>'￥'+fmtNum(n);
  const net=toolTotal-dedTotal;
  const mgmtNo=`N-${y}${String(m).padStart(2,'0')}-C`;
  const issueDate=`${y}年${m}月末日`;
  const line='border-bottom:1px solid #111;';
  const rowKv=(label,val)=>`<tr><td style="width:110px;padding:8px 12px;font-size:12px;background:#f3f4f6;border:1px solid #d1d5db;font-weight:600;white-space:nowrap;">${label}</td><td style="padding:8px 12px;font-size:12px;border:1px solid #d1d5db;">${val}</td></tr>`;
  const rN=(label,amount,sign)=>`<tr><td style="padding:5px 14px;text-align:right;color:#374151;font-size:12px;">${escHtml(label)}</td><td style="padding:5px 6px;text-align:right;font-weight:600;font-size:12px;min-width:120px;${sign==='-'?'color:#b91c1c;':''}">${sign==='-'?'▲':''}${yen(amount)}</td></tr>`;
  // ── 金額=各ツールが計算した外注費(税抜)を正とする。会計は「適格/非適格・登録番号」のみ参照(会計マスタ invPartners) ──
  const okMonth=p=>(!p.effective_from || String(p.effective_from).slice(0,7)<=(ym||'9999-99'));
  const co=normCo(company);
  const invHit=(invPartners||[]).find(p=>normCo(p.name)===co && okMonth(p));
  const registered=invHit?(invHit.registered!==false):false;
  const tno=invHit?(invHit.invoice_number||''):'';
  const hasTax=!!(registered&&tno);
  // 外注費(税抜)=ツール合計。適格なら消費税(10%)を上乗せ、非適格は税表記なし。控除(会計 車両リース/貸付マスタ)は▲。
  const gaityu=toolTotal;
  const zei=hasTax?Math.round(gaityu*0.1):0;
  const payAmount=gaityu+zei-dedTotal;
  const memberCount=payees.length;
  const areas=[...new Set(payees.map(p=>String((p.st&&(p.st.primary_area||p.st.office_name||p.st.shipper))||'').trim()).filter(Boolean))];

async function downloadCompanyPdf(){
  const company=window._lastCompany, ym=window._lastCompanyYm, payees=_companyPayees||[];
  if(!company||!payees.length){alert('法人集計を表示してから実行してください');return;}
  const btn=document.querySelector('button[onclick="downloadCompanyPdf()"]');
  const old=btn?btn.textContent:''; if(btn){btn.disabled=true;btn.textContent='⏳ 生成中...';}
  try{
    const toolTotal=payees.reduce((a,p)=>a+p.amount,0);
    let {items:dedItems}=accCompanyDeduction(company,ym);
    if(!dedItems.length){ payees.forEach(p=>{ const d=accDeductionFor(p.name,ym); if(d.lease>0)dedItems.push({name:`${p.name}（車両リース料）`,amount:d.lease}); if(d.loan>0)dedItems.push({name:`${p.name}（貸付金返済）`,amount:d.loan}); }); }
    const dedTotal=dedItems.reduce((a,d)=>a+d.amount,0);
    const sections=[buildCompanyCoverHtml(company,ym,payees,dedItems,dedTotal,toolTotal)];
    payees.forEach(p=>sections.push(buildPayeeDetailHtml(p)));
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pdfWidth=pdf.internal.pageSize.getWidth();
    const pdfHeight=pdf.internal.pageSize.getHeight();
    const stage=$('pdf-stage');
    for(let i=0;i<sections.length;i++){
      stage.innerHTML=sections[i];
      await new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
      const target=stage.firstElementChild;
      const canvas=await html2canvas(target,{scale:2,backgroundColor:'#ffffff',useCORS:true,logging:false});
      const imgHeight=(canvas.height*pdfWidth)/canvas.width;
      let heightLeft=imgHeight,position=0;
      if(i>0)pdf.addPage();
      const data=canvas.toDataURL('image/jpeg',0.95);
      pdf.addImage(data,'JPEG',0,position,pdfWidth,imgHeight);
      heightLeft-=pdfHeight;
      while(heightLeft>0){ position=heightLeft-imgHeight; pdf.addPage(); pdf.addImage(data,'JPEG',0,position,pdfWidth,imgHeight); heightLeft-=pdfHeight; }
    }
    stage.innerHTML='';
    pdf.save(safeFile(`${ym}_法人まとめ_${company}.pdf`));
  }catch(e){alert('PDF生成失敗: '+e.message);}
  if(btn){btn.textContent=old;btn.disabled=false;}
}

// 失敗しても datalist の NexPort 分は出るので握りつぶす。
async function loadToolCompanies(){
  const fetchRpc=async(base,key)=>{
    try{
      const r=await fetch(base+'/rest/v1/rpc/get_company_list',{
        method:'POST',headers:{'Content-Type':'application/json','apikey':key,'Authorization':'Bearer '+key},body:'{}',
      });
      if(!r.ok)return [];
      const rows=await r.json();
      return (rows||[]).map(x=>x.company_name).filter(Boolean);
    }catch(_){return [];}
  };
  const [askul,delivery]=await Promise.all([
    fetchRpc('https://erfcsnzdooswgpvgrapb.supabase.co',ASKUL_ANON),
    fetchRpc('https://ymdaakiwxkjotlmzveom.supabase.co',DELIVERY_ANON),
  ]);
  toolCompanies=[...askul,...delivery];
}

// 金額が「本人から見て非表示」になる電話番号 (正規化済み) の集合。
// 非表示条件 = 法人/社員区分の非オーナー。 admin/super_admin は除外 (本人は自分の金額が見える)。
let hiddenPhones=new Set();
async function loadBizTypes(){
  const fetchRpc=async(base,key)=>{
    try{
      const r=await fetch(base+'/rest/v1/rpc/get_biz_type_map',{
        method:'POST',headers:{'Content-Type':'application/json','apikey':key,'Authorization':'Bearer '+key},body:'{}',
      });
      if(!r.ok)return [];
      return await r.json()||[];
    }catch(_){return [];}
  };
  const nexportRpc=async()=>{ try{const {data}=await sb.rpc('get_biz_type_map');return data||[];}catch(_){return [];} };
  const [shift,askul,delivery]=await Promise.all([
    nexportRpc(),
    fetchRpc('https://erfcsnzdooswgpvgrapb.supabase.co',ASKUL_ANON),
    fetchRpc('https://ymdaakiwxkjotlmzveom.supabase.co',DELIVERY_ANON),
  ]);
  const s=new Set();
  // 新聞: biz_type==='法人' で非表示
  shift.forEach(r=>{const np=normalizePhone(r.phone);if(np&&r.biz_type==='法人')s.add(np);});
  // askul/delivery: business_type が corporation / employee で非表示
  const hideBiz=bt=>bt==='corporation'||bt==='employee';
  askul.forEach(r=>{const np=normalizePhone(r.phone);if(np&&hideBiz(r.business_type))s.add(np);});
  delivery.forEach(r=>{const np=normalizePhone(r.phone);if(np&&hideBiz(r.business_type))s.add(np);});
  hiddenPhones=s;
}

// メンバー本人視点で金額が非表示になるか
function isAmountHidden(m){
  if(m.is_company_owner)return false;               // オーナーは見える
  if(m.role==='admin'||m.role==='super_admin')return false; // 管理者は本人でも見える
  const np=normalizePhone(m.phone);
  if(!np)return false;                              // 電話未登録は判定不能 → 印なし
  return hiddenPhones.has(np);
}

function renderMemberList(){
  const search=($('admin-mbr-search').value||'').trim().toLowerCase();
  const filter=$('admin-mbr-filter').value;
  const listArea=$('admin-mbr-list-area');

  let list=allMembers.slice();
  if(filter==='admins')list=list.filter(p=>p.role==='admin'||p.role==='super_admin');
  else if(filter==='members')list=list.filter(p=>p.role!=='admin'&&p.role!=='super_admin');
  else if(filter==='owners')list=list.filter(p=>!!p.is_company_owner);
  else if(filter==='no_phone')list=list.filter(p=>!p.phone);
  else if(filter==='no_site')list=list.filter(p=>!p.site);
  else if(filter==='hidden')list=list.filter(p=>isAmountHidden(p));

  if(search){
    const q=search;
    list=list.filter(p=>
      (p.display_name||'').toLowerCase().includes(q)||
      (p.phone||'').includes(q)||
      (p.company||'').toLowerCase().includes(q)||
      (p.position||'').toLowerCase().includes(q)||
      (p.site||'').toLowerCase().includes(q)
    );
  }

  $('admin-mbr-count').textContent=`${list.length}件 / 全${allMembers.length}件`;

  if(list.length===0){
    listArea.innerHTML='<div class="empty">該当するメンバーがいません</div>';
    return;
  }

  const groupBy=($('admin-mbr-groupby')||{}).value||'none';
  // 会社名の正規化 (半角/全角・前後空白・株式会社プレフィックス除去で同一視)
  const normalizeCompany=(s)=>{
    if(!s)return '';
    let n=String(s).trim();
    // 全角→半角の英数字変換
    n=n.replace(/[Ａ-Ｚａ-ｚ０-９]/g,c=>String.fromCharCode(c.charCodeAt(0)-0xFEE0));
    n=n.replace(/\s+/g,'').toLowerCase();
    n=n.replace(/^株式会社|^(株)|（株）|株式会社$|(株)$/g,'');
    return n;
  };

  const renderRow=(p)=>{
    const adminTag=(p.role==='super_admin')?'<span style="background:#fde68a;color:#92400e;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:6px;">最高管理者</span>'
      :(p.role==='admin')?'<span style="background:#e0e7ff;color:#3730a3;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:6px;">管理者</span>':'';
    const ownerTag=p.is_company_owner?'<span style="background:#fef3c7;color:#92400e;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:6px;">👑 オーナー</span>':'';
    const pendingTag=p.account_status==='pending_approval'?'<span style="background:#fee2e2;color:#991b1b;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:6px;">承認待ち</span>':'';
    const hiddenTag=isAmountHidden(p)?'<span title="法人/社員区分のため本人は自分の金額を見られません。 👑オーナー設定で表示可" style="background:#f3e8ff;color:#6b21a8;padding:1px 6px;border-radius:8px;font-size:10px;margin-left:6px;">🔒 金額非表示</span>':'';
    const sub=[(groupBy==='company'?null:p.company),p.position,p.employment_type].filter(Boolean).join(' / ');
    const siteStr=p.site
      ? `<span style="background:#dbeafe;color:#1e40af;padding:1px 8px;border-radius:8px;font-size:10px;font-weight:600;">📍 ${escHtml(p.site)}</span>`
      : '<span style="background:#f1f5f9;color:#94a3b8;padding:1px 8px;border-radius:8px;font-size:10px;">📍 現場未設定</span>';
    const phoneStr=p.phone?escHtml(p.phone):'<span style="color:var(--danger);">未登録</span>';
    return `<div class="mbr-row" style="display:flex;justify-content:space-between;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid var(--border);">
      <div style="flex:1;min-width:0;">
        <div style="font-weight:600;font-size:14px;">${escHtml(p.display_name||'(名前未設定)')}${adminTag}${ownerTag}${pendingTag}${hiddenTag}</div>
        <div style="margin-top:4px;display:flex;gap:6px;align-items:center;flex-wrap:wrap;">
          ${siteStr}
          ${sub?`<span style="font-size:11px;color:var(--text-sub);">${escHtml(sub)}</span>`:''}
        </div>
      </div>
      <div style="font-size:12px;font-family:monospace;color:var(--text-sub);white-space:nowrap;">${phoneStr}</div>
      ${p.phone?`<button class="btn" style="padding:6px 10px;font-size:12px;" onclick="viewMemberStatement('${escHtml(p.id)}')" title="この人の支払明細を表示">📄 明細</button>`:''}
      <button class="btn-ghost" onclick="openMemberEdit('${escHtml(p.id)}')">編集</button>
    </div>`;
  };

  if(groupBy==='company'){
    // 会社別にグループ化 (正規化キーで集約、 表示名は元データの最頻値を使用)
    const groups=new Map(); // normalizedKey → { displayName, members: [] }
    for(const p of list){
      const key=normalizeCompany(p.company);
      const disp=key?(p.company||'').trim():'(会社未設定)';
      if(!groups.has(key))groups.set(key,{displayName:disp,members:[]});
      groups.get(key).members.push(p);
    }
    // ソート: 会社未設定を最後、 それ以外はメンバー数降順
    const arr=[...groups.entries()].sort((a,b)=>{
      if(!a[0]&&b[0])return 1;
      if(a[0]&&!b[0])return -1;
      return b[1].members.length-a[1].members.length;
    });
    let html='';
    for(const [key,g] of arr){
      const ownerCnt=g.members.filter(m=>m.is_company_owner).length;
      const adminCnt=g.members.filter(m=>m.role==='admin'||m.role==='super_admin').length;
      const phoneSetCnt=g.members.filter(m=>!!m.phone).length;
      html+=`<details class="card" style="padding:0;overflow:hidden;margin-bottom:10px;" ${key?'open':''}>
        <summary style="padding:12px 14px;background:#f1f5f9;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px;font-size:14px;font-weight:600;list-style:none;">
          <span>🏢 ${escHtml(g.displayName)}</span>
          <span style="font-size:11px;color:var(--text-sub);font-weight:400;">
            ${g.members.length}名${ownerCnt?` / 👑 ${ownerCnt}`:''}${adminCnt?` / 管理 ${adminCnt}`:''} / 📞 ${phoneSetCnt}/${g.members.length}
          </span>
        </summary>
        <div>${g.members.map(renderRow).join('')}</div>
      </details>`;
    }
    listArea.innerHTML=html;
  }else{
    const rows=list.map(renderRow).join('');
    listArea.innerHTML=`<div class="card" style="padding:0;overflow:hidden;">${rows}</div>`;
  }
}

  $('mem-edit-site').value=p.site||'';
  memUpdateInvoiceHint();
  $('mem-edit-owner').checked=!!p.is_company_owner;
  // 既に登録済みの site 値を datalist のサジェストに反映
  const uniqueSites=[...new Set(allMembers.map(m=>m.site).filter(Boolean))].sort();
  $('site-suggestions').innerHTML=uniqueSites.map(s=>`<option value="${escHtml(s)}">`).join('');
  // 会社名サジェスト: NexPort profiles の既登録会社名 + 各ツール (askul/delivery) の
  // 所属法人名をマージ (タイポ・表記ゆれ防止)
  const nexportCompanies=allMembers.map(m=>(m.company||'').trim()).filter(Boolean);
  const uniqueCompanies=[...new Set([...nexportCompanies,...toolCompanies.map(c=>(c||'').trim()).filter(Boolean)])].sort();
  $('company-suggestions').innerHTML=uniqueCompanies.map(c=>`<option value="${escHtml(c)}">`).join('');
  $('mem-edit-err').style.display='none';
  $('mem-edit-save-btn').dataset.id=id;
  $('member-edit-modal').style.display='flex';
  // 差引項目を取得して表示
  $('mem-edit-deductions').innerHTML='<div style="color:var(--text-sub);font-size:11px;padding:4px 0;">読み込み中...</div>';
  const {data:deds}=await sb.from('member_deductions').select('id, label, amount, active').eq('profile_id',id).order('sort_order').order('created_at');
  $('mem-edit-deductions').innerHTML='';
  (deds||[]).forEach(d=>addDeductionRow(d));
};

  row.dataset.id=item?.id||'';
  row.style.cssText='background:#fff;border:1px solid #fde047;border-radius:6px;padding:8px;margin-bottom:6px;';
  row.innerHTML=`
    <input type="text" class="input dedu-label" placeholder="項目名 (例: リース代)" value="${escHtml(item?.label||'')}" style="width:100%;font-size:13px;padding:6px 8px;margin-bottom:6px;box-sizing:border-box;">
    <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
      <div style="display:flex;align-items:center;gap:4px;flex:1;min-width:140px;">
        <span style="font-size:13px;color:var(--text-sub);">¥</span>
        <input type="number" class="input dedu-amount" placeholder="0" value="${item?.amount??''}" min="0" step="100" style="flex:1;min-width:80px;font-size:13px;padding:6px 8px;text-align:right;">
      </div>
      <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer;white-space:nowrap;color:var(--text-sub);">
